<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('검색 결과', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <h1>검색 결과</h1>
    <p>
      "<span th:text="${q}"></span>" 에 대한 검색 결과
      <span style="color:var(--blue);font-weight:600;" th:text="${totalCount}"></span>건
    </p>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <!-- Search bar -->
    <form th:action="@{/search}" method="get" class="search-row" style="margin-bottom:32px;">
      <input type="text" name="q" th:value="${q}" placeholder="검색어를 입력하세요..." class="search-input" style="flex:1;">
      <button type="submit" class="btn btn-blue btn-md">검색</button>
    </form>

    <!-- Posts -->
    <div th:if="${posts != null and !posts.isEmpty()}" class="search-section">
      <div class="search-section-head">📝 게시글 (<span th:text="${posts.size()}"></span>)</div>
      <div class="card card-flush">
        <div class="table-wrap">
          <table class="table">
            <tbody>
              <tr th:each="p : ${posts}">
                <td>
                  <a th:href="@{/posts/{id}(id=${p.id})}" th:text="${p.title}" class="table-link"></a>
                </td>
                <td style="width:80px;"><span class="pill pill-gray" th:text="${p.category}"></span></td>
                <td style="width:90px;" th:text="${p.author.nickname}"></td>
                <td style="width:70px;font-size:.78rem;color:var(--t5);" th:text="${#temporals.format(p.createdAt,'MM.dd')}"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Docs -->
    <div th:if="${docs != null and !docs.isEmpty()}" class="search-section">
      <div class="search-section-head">📄 기술 문서 (<span th:text="${docs.size()}"></span>)</div>
      <div class="card card-flush">
        <div class="table-wrap">
          <table class="table">
            <tbody>
              <tr th:each="d : ${docs}">
                <td>
                  <a th:href="@{/docs/{id}(id=${d.id})}" th:text="${d.title}" class="table-link"></a>
                </td>
                <td style="width:80px;"><span class="pill pill-gray" th:text="${d.category}"></span></td>
                <td style="width:90px;" th:text="${d.author.nickname}"></td>
                <td style="width:70px;font-size:.78rem;color:var(--t5);" th:text="${#temporals.format(d.createdAt,'MM.dd')}"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Videos -->
    <div th:if="${videos != null and !videos.isEmpty()}" class="search-section">
      <div class="search-section-head">🎬 영상 (<span th:text="${videos.size()}"></span>)</div>
      <div class="card card-flush">
        <div class="table-wrap">
          <table class="table">
            <tbody>
              <tr th:each="v : ${videos}">
                <td>
                  <a th:href="@{/videos/{id}(id=${v.id})}" th:text="${v.title}" class="table-link"></a>
                </td>
                <td style="width:80px;"><span class="pill pill-gray" th:text="${v.category}"></span></td>
                <td style="width:90px;" th:text="${v.author.nickname}"></td>
                <td style="width:70px;font-size:.78rem;color:var(--t5);" th:text="${#temporals.format(v.createdAt,'MM.dd')}"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Projects -->
    <div th:if="${projects != null and !projects.isEmpty()}" class="search-section">
      <div class="search-section-head">🚀 프로젝트 (<span th:text="${projects.size()}"></span>)</div>
      <div class="card card-flush">
        <div class="table-wrap">
          <table class="table">
            <tbody>
              <tr th:each="p : ${projects}">
                <td>
                  <a th:href="@{/projects/{id}(id=${p.id})}" th:text="${p.title}" class="table-link"></a>
                </td>
                <td style="width:90px;"><span class="pill" th:classappend="${p.status == 'IN_PROGRESS'} ? ' pill-blue' : ' pill-gray'"
                      th:text="${p.status == 'IN_PROGRESS'} ? '진행 중' : '완료'"></span></td>
                <td style="width:90px;" th:text="${p.author.nickname}"></td>
                <td style="width:70px;font-size:.78rem;color:var(--t5);" th:text="${#temporals.format(p.createdAt,'MM.dd')}"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div th:if="${(posts == null or posts.isEmpty()) and (docs == null or docs.isEmpty()) and (videos == null or videos.isEmpty()) and (projects == null or projects.isEmpty())}"
         class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">"<span th:text="${q}"></span>"에 대한 결과가 없습니다.</div>
      <div class="empty-sub">다른 검색어를 시도해보세요</div>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
