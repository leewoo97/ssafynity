<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' — SSAFYnity'">SSAFYnity</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230071e3'/><text y='22' x='6' font-size='18' font-family='system-ui' font-weight='700' fill='white'>S</text></svg>">
</head>
<body>

<!-- Reading Progress Bar -->
<div class="reading-bar" id="readingBar"></div>

<!-- ── NAV ─────────────────────────────────────────────── -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">SSAFY<span>nity</span></a>

    <div class="nav-links">
      <a th:href="@{/posts}">커뮤니티</a>
      <a th:href="@{/projects}">프로젝트</a>
      <a th:href="@{/docs}">문서</a>
      <a th:href="@{/videos}">영상</a>
      <a th:href="@{/events}">이벤트</a>
      <a th:href="@{/chat}">채팅</a>
    </div>

    <div class="nav-actions">
      <form th:action="@{/search}" method="get" class="nav-search-form">
        <button type="submit" class="nav-search-btn">⌕</button>
        <input type="text" name="q" placeholder="검색" autocomplete="off">
      </form>

      <th:block th:if="${session.loginMember != null}">
        <a th:href="@{/notifications}" class="nav-icon-btn" title="알림">🔔</a>
        <a th:href="@{/profile/me}" class="nav-user-chip">
          <span class="nav-user-dot"
                th:text="${#strings.substring(session.loginMember.nickname,0,1)}">U</span>
          <span th:text="${session.loginMember.nickname}">사용자</span>
        </a>
        <a th:href="@{/logout}" class="nav-btn nav-btn-ghost">로그아웃</a>
      </th:block>

      <th:block th:unless="${session.loginMember != null}">
        <a th:href="@{/member/login}" class="nav-btn nav-btn-ghost">로그인</a>
        <a th:href="@{/member/register}" class="nav-btn nav-btn-fill">회원가입</a>
      </th:block>
    </div>

    <!-- Hamburger -->
    <button class="nav-hamburger" id="navHamburger" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Mobile Drawer -->
<div class="nav-drawer" id="navDrawer">
  <div class="nav-drawer-bg" id="navDrawerBg"></div>
  <div class="nav-drawer-panel">
    <button class="nav-drawer-close" id="navDrawerClose">✕</button>
    <a th:href="@{/posts}">💬 커뮤니티</a>
    <a th:href="@{/projects}">🚀 프로젝트</a>
    <a th:href="@{/docs}">📄 문서</a>
    <a th:href="@{/videos}">🎬 영상</a>
    <a th:href="@{/events}">📅 이벤트</a>
    <a th:href="@{/chat}">💬 채팅</a>
    <div class="nav-drawer-sep"></div>
    <th:block th:if="${session.loginMember != null}">
      <a th:href="@{/profile/me}">👤 마이페이지</a>
      <a th:href="@{/notifications}">🔔 알림</a>
      <a th:href="@{/bookmarks}">🔖 북마크</a>
      <div class="nav-drawer-sep"></div>
      <a th:href="@{/logout}">로그아웃</a>
    </th:block>
    <th:block th:unless="${session.loginMember != null}">
      <a th:href="@{/member/login}">로그인</a>
      <a th:href="@{/member/register}">회원가입</a>
    </th:block>
  </div>
</div>

<!-- ── MAIN ─────────────────────────────────────────────── -->
<main class="page">
  <th:block th:replace="${content}"/>
</main>

<!-- ── FOOTER ───────────────────────────────────────────── -->
<footer>
  <div class="footer-inner">
    <div class="footer-grid">
      <div>
        <a href="/" class="footer-brand">SSAFY<span>nity</span></a>
        <p class="footer-desc">삼성 청년 SW 아카데미 수료생을 위한<br>커뮤니티 플랫폼입니다.</p>
      </div>
      <div class="footer-col">
        <h5>커뮤니티</h5>
        <a th:href="@{/posts}">게시판</a>
        <a th:href="@{/projects}">프로젝트</a>
        <a th:href="@{/events}">이벤트</a>
      </div>
      <div class="footer-col">
        <h5>지식</h5>
        <a th:href="@{/docs}">문서 공유</a>
        <a th:href="@{/videos}">영상</a>
        <a th:href="@{/chat}">채팅방</a>
      </div>
      <div class="footer-col">
        <h5>계정</h5>
        <a th:href="@{/profile/me}">마이페이지</a>
        <a th:href="@{/notifications}">알림</a>
        <a th:href="@{/bookmarks}">북마크</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span class="footer-copy">© 2025 SSAFYnity. All rights reserved.</span>
      <span class="footer-tagline">Made with ♥ by SSAFY</span>
    </div>
  </div>
</footer>

<!-- ── BACK TO TOP ───────────────────────────────────────── -->
<a href="#" class="back-top" id="backTop">↑</a>

<script>
  // Mobile nav
  const ham = document.getElementById('navHamburger');
  const drawer = document.getElementById('navDrawer');
  const drawerBg = document.getElementById('navDrawerBg');
  const drawerClose = document.getElementById('navDrawerClose');
  if (ham) {
    ham.addEventListener('click', () => drawer.classList.add('open'));
    drawerBg.addEventListener('click', () => drawer.classList.remove('open'));
    drawerClose.addEventListener('click', () => drawer.classList.remove('open'));
  }

  // Reading bar
  const bar = document.getElementById('readingBar');
  const backTop = document.getElementById('backTop');
  window.addEventListener('scroll', () => {
    const h = document.body.scrollHeight - window.innerHeight;
    if (bar && h > 0) bar.style.width = (window.scrollY / h * 100) + '%';
    if (backTop) backTop.classList.toggle('show', window.scrollY > 400);
  }, { passive: true });
</script>
</body>
</html>
