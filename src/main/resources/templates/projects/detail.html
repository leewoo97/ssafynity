<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${project.title}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="section-sm">
  <div class="container">
    <div class="two-col">
      <div>
        <div class="card">
          <div th:if="${project.thumbnailUrl != null}" style="margin:-28px -28px 24px;overflow:hidden;border-radius:var(--r-lg) var(--r-lg) 0 0;">
            <img th:src="${project.thumbnailUrl}" alt="thumbnail"
                 style="width:100%;height:260px;object-fit:cover;">
          </div>

          <div class="post-header">
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
              <span class="pill pill-gray" th:text="${project.category}"></span>
              <span th:each="tag,ti : ${project.techStack?.split(',')}" th:if="${ti.index < 4}">
                <span class="tag" th:text="${#strings.trim(tag)}"></span>
              </span>
            </div>
            <h1 class="post-title" th:text="${project.title}"></h1>
            <div class="post-attrs">
              <span class="post-attr">
                <a th:href="@{'/member/profile/' + ${project.author.id}}"
                   style="font-weight:600;color:var(--blue);"
                   th:text="${project.author.nickname}"></a>
              </span>
              <span class="post-attr">🕐 <span th:text="${#temporals.format(project.createdAt,'yyyy.MM.dd HH:mm')}"></span></span>
              <span class="post-attr">👁 <span th:text="${project.viewCount}"></span></span>
            </div>
          </div>

          <div class="post-body" th:text="${project.content}"></div>

          <div class="post-actions">
            <th:block th:if="${session.loginMember != null and session.loginMember.id == project.author.id}">
              <a th:href="@{'/projects/' + ${project.id} + '/edit'}" class="btn btn-ghost btn-sm">수정</a>
              <form th:action="@{'/projects/' + ${project.id} + '/delete'}" method="post" style="display:inline;"
                    onsubmit="return confirm('삭제하시겠습니까?')">
                <button type="submit" class="btn btn-danger btn-sm">삭제</button>
              </form>
            </th:block>
            <a th:href="@{/projects}" class="btn btn-ghost btn-sm" style="margin-left:auto;">목록</a>
          </div>
        </div>
      </div>

      <aside>
        <div class="sidebar-block">
          <div class="sidebar-block-head">🚀 프로젝트 정보</div>
          <div class="sidebar-block-body">
            <div style="padding:16px 18px;display:flex;align-items:center;gap:12px;">
              <div class="av av-md" th:text="${project.author.name != null ? #strings.substring(project.author.name,0,1) : 'U'}">U</div>
              <div>
                <div style="font-size:.9rem;font-weight:600;color:var(--t1);" th:text="${project.author.nickname}"></div>
                <div style="font-size:.76rem;color:var(--t4);margin-top:2px;" th:text="${project.author.name}"></div>
              </div>
            </div>
            <div class="sidebar-row" th:if="${project.githubUrl != null}">
              <a th:href="${project.githubUrl}" target="_blank"
                 style="color:var(--blue);font-size:.85rem;">🔗 GitHub 보기</a>
            </div>
            <div class="sidebar-row" th:if="${project.demoUrl != null}">
              <a th:href="${project.demoUrl}" target="_blank"
                 style="color:var(--blue);font-size:.85rem;">▶️ Demo 보기</a>
            </div>
          </div>
        </div>
        <div class="sidebar-block" th:if="${project.techStack != null and !#strings.isEmpty(project.techStack)}">
          <div class="sidebar-block-head">기술 스택</div>
          <div class="sidebar-block-body">
            <div style="padding:12px 18px;display:flex;flex-wrap:wrap;gap:6px;">
              <span th:each="tag : ${project.techStack.split(',')}" class="tag"
                    th:text="${#strings.trim(tag)}"></span>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
