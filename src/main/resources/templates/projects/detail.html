<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${project.title}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="section-sm">
  <div class="container">
    <div class="two-col">
      <div>
        <div class="card">
          <div th:if="${project.thumbnailUrl != null and !#strings.isEmpty(project.thumbnailUrl)}"
               style="margin:-24px -24px 24px;border-radius:var(--r) var(--r) 0 0;overflow:hidden;max-height:280px;">
            <img th:src="${project.thumbnailUrl}" alt="thumbnail" style="width:100%;object-fit:cover;">
          </div>
          <div class="post-header">
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
              <span class="pill" th:classappend="${project.status == 'IN_PROGRESS'} ? ' pill-blue' : ' pill-gray'"
                    th:text="${project.status == 'IN_PROGRESS'} ? '진행 중' : '완료'"></span>
              <span class="post-attr">👥 팀원 <span th:text="${project.teamSize}"></span>명</span>
            </div>
            <h1 class="post-title" th:text="${project.title}"></h1>
            <div class="post-attrs">
              <span class="post-attr">
                <a th:href="@{/profile/{id}(id=${project.author.id})}"
                   style="font-weight:600;color:var(--blue);"
                   th:text="${project.author.nickname}"></a>
              </span>
              <span class="post-attr">🕐 <span th:text="${#temporals.format(project.createdAt,'yyyy.MM.dd')}"></span></span>
              <span class="post-attr">👁 <span th:text="${project.viewCount}"></span></span>
              <span class="post-attr">❤ <span th:text="${project.likeCount}"></span></span>
            </div>
          </div>

          <div class="post-body" th:text="${project.description}"></div>

          <div style="margin:16px 0;" th:if="${project.techStack != null and !#strings.isEmpty(project.techStack)}">
            <div style="font-size:.82rem;font-weight:600;color:var(--t4);margin-bottom:8px;">기술 스택</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <span th:each="tech : ${project.techStack.split(',')}" class="tag" th:text="${#strings.trim(tech)}"></span>
            </div>
          </div>

          <div class="post-actions">
            <form th:if="${session.loginMember != null}" th:action="@{/projects/{id}/like(id=${project.id})}" method="post" style="display:inline;">
              <button type="submit" class="like-btn">❤ <span th:text="${project.likeCount}"></span></button>
            </form>
            <form th:if="${session.loginMember != null}" th:action="@{/projects/{id}/bookmark(id=${project.id})}" method="post" style="display:inline;">
              <button type="submit" class="btn btn-ghost btn-sm"
                      th:text="${isBookmarked} ? '🔖 북마크 해제' : '🔖 북마크'"></button>
            </form>
            <a th:if="${project.githubUrl != null and !#strings.isEmpty(project.githubUrl)}"
               th:href="${project.githubUrl}" target="_blank" class="btn btn-ghost btn-sm">GitHub</a>
            <a th:if="${project.demoUrl != null and !#strings.isEmpty(project.demoUrl)}"
               th:href="${project.demoUrl}" target="_blank" class="btn btn-tinted btn-sm">Demo</a>
            <th:block th:if="${session.loginMember != null and session.loginMember.id == project.author.id}">
              <a th:href="@{/projects/{id}/edit(id=${project.id})}" class="btn btn-ghost btn-sm">수정</a>
              <form th:action="@{/projects/{id}/delete(id=${project.id})}" method="post" style="display:inline;"
                    onsubmit="return confirm('삭제하시겠습니까?')">
                <button type="submit" class="btn btn-danger btn-sm">삭제</button>
              </form>
            </th:block>
            <a th:href="@{/projects}" class="btn btn-ghost btn-sm" style="margin-left:auto;">목록</a>
          </div>
        </div>
      </div>

      <aside>
        <div class="sidebar-block">
          <div class="sidebar-block-head">👤 작성자</div>
          <div class="sidebar-block-body">
            <div style="padding:16px 18px;display:flex;align-items:center;gap:12px;">
              <div class="av av-md" th:text="${#strings.substring(project.author.nickname,0,1)}">U</div>
              <div>
                <div style="font-size:.9rem;font-weight:600;color:var(--t1);" th:text="${project.author.nickname}"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="sidebar-block" th:if="${relatedProjects != null and !relatedProjects.isEmpty()}">
          <div class="sidebar-block-head">관련 프로젝트</div>
          <div class="sidebar-block-body">
            <div th:each="p : ${relatedProjects}" class="sidebar-row">
              <a th:href="@{/projects/{id}(id=${p.id})}" th:text="${p.title}" class="sidebar-row-title"></a>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
