<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${project != null} ? '프로젝트 수정' : '프로젝트 등록', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <h1 th:text="${project != null} ? '프로젝트 수정' : '프로젝트 등록'"></h1>
  </div>
</div>

<div class="section-sm">
  <div class="container-sm">
    <div class="card">
      <form th:action="${project != null} ? @{'/projects/' + ${project.id} + '/edit'} : @{/projects}" method="post">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">카테고리</label>
            <select name="category" class="form-select">
              <option th:each="cat : ${categories}"
                      th:value="${cat}" th:text="${cat}"
                      th:selected="${project != null and project.category == cat}"></option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">기술 스택 <span style="font-weight:400;color:var(--t5);">(쉼표 구분)</span></label>
            <input class="form-input" type="text" name="techStack"
                   th:value="${project?.techStack}" placeholder="React, Spring Boot, MySQL">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">제목</label>
          <input class="form-input" type="text" name="title"
                 th:value="${project?.title}" required placeholder="프로젝트 이름을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">한 줄 소개</label>
          <input class="form-input" type="text" name="summary"
                 th:value="${project?.summary}" placeholder="프로젝트를 한 문장으로 소개하세요">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">GitHub URL</label>
            <input class="form-input" type="url" name="githubUrl"
                   th:value="${project?.githubUrl}" placeholder="https://github.com/...">
          </div>
          <div class="form-group">
            <label class="form-label">Demo URL</label>
            <input class="form-input" type="url" name="demoUrl"
                   th:value="${project?.demoUrl}" placeholder="https://...">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">내용</label>
          <textarea class="form-textarea" name="content" rows="12" required
                    placeholder="프로젝트 설명, 개발 과정, 결과 등을 공유하세요"
                    th:text="${project?.content}"></textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <a th:href="${project != null} ? @{'/projects/' + ${project.id}} : @{/projects}" class="btn btn-ghost btn-md">취소</a>
          <button type="submit" class="btn btn-blue btn-md"
                  th:text="${project != null} ? '수정하기' : '등록하기'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
