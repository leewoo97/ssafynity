<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${project != null and project.id != null} ? '프로젝트 수정' : '프로젝트 등록', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css">

<div class="page-header">
  <div class="container">
    <h1 th:text="${project != null and project.id != null} ? '프로젝트 수정' : '프로젝트 등록'"></h1>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <div class="card">
      <form id="project-form"
            th:action="${project != null and project.id != null} ? @{/projects/{id}/edit(id=${project.id})} : @{/projects}"
            method="post">
        <div class="form-group">
          <label class="form-label">프로젝트 제목</label>
          <input class="form-input" type="text" name="title"
                 th:value="${project?.title}" required placeholder="프로젝트 이름">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">팀원 수</label>
            <input class="form-input" type="number" name="teamSize" min="1" max="20"
                   th:value="${project?.teamSize}" placeholder="6">
          </div>
          <div class="form-group">
            <label class="form-label">진행 상태</label>
            <select name="status" class="form-select">
              <option value="IN_PROGRESS" th:selected="${project != null and project.status == 'IN_PROGRESS'}">진행 중</option>
              <option value="COMPLETED" th:selected="${project != null and project.status == 'COMPLETED'}">완료</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">기술 스택 <span style="font-weight:400;color:var(--t5);">(쉼표 구분)</span></label>
          <input class="form-input" type="text" name="techStack"
                 th:value="${project?.techStack}" placeholder="Java, Spring Boot, React, MySQL">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">GitHub URL</label>
            <input class="form-input" type="url" name="githubUrl"
                   th:value="${project?.githubUrl}" placeholder="https://github.com/...">
          </div>
          <div class="form-group">
            <label class="form-label">Demo URL</label>
            <input class="form-input" type="url" name="demoUrl"
                   th:value="${project?.demoUrl}" placeholder="https://...">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">썸네일 URL <span style="font-weight:400;color:var(--t5);">(선택)</span></label>
          <input class="form-input" type="url" name="thumbnailUrl"
                 th:value="${project?.thumbnailUrl}" placeholder="https://...">
        </div>
        <div class="form-group">
          <label class="form-label">프로젝트 설명</label>
          <div id="initial-content" style="display:none" th:utext="${project?.description}"></div>
          <div id="editor"></div>
          <input type="hidden" name="description" id="content-input">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
          <a th:href="${project != null and project.id != null} ? @{/projects/{id}(id=${project.id})} : @{/projects}"
             class="btn btn-ghost btn-md">취소</a>
          <button type="submit" class="btn btn-blue btn-md"
                  th:text="${project != null and project.id != null} ? '수정하기' : '등록하기'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
var quill = new Quill('#editor', {
  theme: 'snow',
  placeholder: '내용을 입력하세요...',
  modules: {
    toolbar: {
      container: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ 'color': [] }, { 'background': [] }],
        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
        [{ 'align': [] }],
        ['link', 'image'],
        ['blockquote', 'code-block'],
        ['clean']
      ],
      handlers: { image: imageHandler }
    }
  }
});

var ic = document.getElementById('initial-content');
if (ic && ic.innerHTML.trim()) {
  quill.root.innerHTML = ic.innerHTML;
}

function imageHandler() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.click();
  input.onchange = function () {
    var file = input.files[0];
    if (!file) return;
    var fd = new FormData();
    fd.append('file', file);
    fetch('/upload/image', { method: 'POST', body: fd })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var range = quill.getSelection(true);
        quill.insertEmbed(range.index, 'image', data.url);
      });
  };
}

document.getElementById('project-form').addEventListener('submit', function () {
  document.getElementById('content-input').value = quill.root.innerHTML;
});
</script>

</th:block>
</body>
</html>
