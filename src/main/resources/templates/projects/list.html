<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('프로젝트', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Projects</div>
        <h1>프로젝트</h1>
        <p>팀 프로젝트를 공유하고 피드백을 나눠보세요</p>
      </div>
      <a th:href="@{/projects/new}" class="btn btn-blue btn-md">🚀 프로젝트 등록</a>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <!-- Tabs -->
    <div class="tabs">
      <a th:href="@{/projects(keyword=${keyword})}"
         class="tab" th:classappend="${category == null or category == ''} ? ' active' : ''">전체</a>
      <a th:each="cat : ${categories}"
         th:href="@{/projects(category=${cat},keyword=${keyword})}"
         th:text="${cat}" class="tab"
         th:classappend="${cat == category} ? ' active' : ''"></a>
    </div>

    <!-- Search -->
    <form th:action="@{/projects}" method="get" class="search-row" style="margin-bottom:24px;">
      <input type="hidden" name="category" th:value="${category}">
      <input type="text" name="keyword" th:value="${keyword}" placeholder="프로젝트 검색..." class="search-input">
      <button type="submit" class="btn btn-blue btn-md">검색</button>
    </form>

    <div th:if="${projects == null or projects.content.isEmpty()}" class="empty">
      <div class="empty-icon">🚀</div>
      <div class="empty-title">등록된 프로젝트가 없습니다.</div>
      <div class="empty-sub" style="margin-top:16px;">
        <a th:href="@{/projects/new}" class="btn btn-blue btn-md">첫 프로젝트 등록하기</a>
      </div>
    </div>

    <div class="project-grid">
      <div th:each="project : ${projects.content}" class="project-card">
        <div class="project-thumb">
          <img th:if="${project.thumbnailUrl != null}"
               th:src="${project.thumbnailUrl}" alt="thumbnail">
          <div th:unless="${project.thumbnailUrl != null}"
               style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,var(--blue-xl),#e0e7ff);">🚀</div>
        </div>
        <div class="project-body">
          <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;">
            <span class="pill pill-gray" th:text="${project.category}"></span>
            <span th:each="tag,ti : ${project.techStack?.split(',')}" th:if="${ti.index < 2}">
              <span class="tag" th:text="${#strings.trim(tag)}"></span>
            </span>
          </div>
          <div class="project-card-title">
            <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.title}"></a>
          </div>
          <div class="project-card-desc" th:if="${project.summary != null}"
               th:text="${project.summary}"></div>
          <div class="project-card-meta">
            <span th:text="${project.author.nickname}"></span>
            <span>·</span>
            <span th:text="${#temporals.format(project.createdAt,'yyyy.MM.dd')}"></span>
            <span>·</span>
            <span>👁 <span th:text="${project.viewCount}"></span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="pagination" th:if="${projects != null and projects.totalPages > 1}">
      <a th:if="${projects.hasPreviousPage}" th:href="@{/projects(page=${projects.number-1},category=${category},keyword=${keyword})}">‹</a>
      <th:block th:each="i : ${#numbers.sequence(0, projects.totalPages - 1)}">
        <a th:href="@{/projects(page=${i},category=${category},keyword=${keyword})}"
           th:text="${i+1}" th:classappend="${i == projects.number} ? ' active' : ''"></a>
      </th:block>
      <a th:if="${projects.hasNextPage}" th:href="@{/projects(page=${projects.number+1},category=${category},keyword=${keyword})}">›</a>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
