<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('프로젝트')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container" style="padding-top:1.5rem;">

  <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1.2rem;">
    <div>
      <h2 style="font-size:1.5rem; font-weight:800;">💻 프로젝트</h2>
      <p style="color:var(--muted); font-size:.88rem; margin-top:.2rem;">멤버들의 프로젝트와 포트폴리오를 공유합니다.</p>
    </div>
    <a th:if="${session.loginMember != null}" th:href="@{/projects/new}" class="btn btn-primary">+ 프로젝트 등록</a>
  </div>

  <!-- 검색 & 정렬 -->
  <div class="card" style="margin-bottom:1.2rem; padding:1rem 1.25rem;">
    <form th:action="@{/projects}" method="get" style="display:flex; gap:.75rem; flex-wrap:wrap; align-items:center;">
      <input type="text" name="keyword" th:value="${keyword}" placeholder="프로젝트 / 기술 스택 검색..."
             style="flex:1; min-width:200px; padding:.5rem .85rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text);">
      <select name="sort" style="padding:.5rem .85rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text);">
        <option value="latest" th:selected="${sort == 'latest'}">최신순</option>
        <option value="popular" th:selected="${sort == 'popular'}">인기순</option>
      </select>
      <button type="submit" class="btn btn-primary">검색</button>
      <a th:href="@{/projects}" class="btn btn-ghost">초기화</a>
    </form>
  </div>

  <!-- 프로젝트 그리드 -->
  <div th:if="${projects.isEmpty()}" class="card">
    <div class="empty-msg">
      <p style="font-size:2rem;">💻</p>
      <p>등록된 프로젝트가 없습니다.<th:block th:if="${session.loginMember != null}"> <a th:href="@{/projects/new}">첫 프로젝트를 등록해보세요!</a></th:block></p>
    </div>
  </div>

  <div th:if="${!projects.isEmpty()}" class="project-grid">
    <div th:each="proj : ${projects}" class="project-card">
      <a th:href="@{/projects/{id}(id=${proj.id})}" class="project-thumb"
         th:style="${proj.thumbnailUrl != null} ? 'background-image:url('+proj.thumbnailUrl+');background-size:cover;background-position:center;' : ''">
        <span th:if="${proj.thumbnailUrl == null}" style="font-size:2.5rem;">💻</span>
      </a>
      <div class="project-body">
        <div style="display:flex; gap:.4rem; align-items:center; margin-bottom:.3rem;">
          <span class="cat-badge" th:text="${proj.status}" style="font-size:.72rem;"></span>
          <span th:if="${proj.teamSize != null}" style="font-size:.75rem; color:var(--muted);">팀 <span th:text="${proj.teamSize}"></span>명</span>
        </div>
        <h4><a th:href="@{/projects/{id}(id=${proj.id})}" th:text="${proj.title}"></a></h4>
        <p class="project-desc" th:text="${proj.description}"></p>
        <div class="project-tags">
          <span th:each="tech,ti : ${proj.techStack?.split(',')}" th:if="${ti.index < 4}">
            <span class="tech-tag" th:text="${#strings.trim(tech)}"></span>
          </span>
        </div>
        <div class="project-meta">
          <span th:text="${proj.author.nickname}"></span>
          <div style="display:flex; gap:.6rem;">
            <span>👍 <span th:text="${proj.likeCount}"></span></span>
            <span>👁 <span th:text="${proj.viewCount}"></span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 페이지네이션 -->
  <div th:if="${totalPages > 1}" style="display:flex; justify-content:center; gap:.4rem; margin-top:2rem;">
    <a th:if="${currentPage > 0}"
       th:href="@{/projects(page=${currentPage-1}, keyword=${keyword}, sort=${sort})}"
       class="btn btn-ghost btn-sm">← 이전</a>
    <span th:each="i : ${#numbers.sequence(0, totalPages-1)}">
      <a th:href="@{/projects(page=${i}, keyword=${keyword}, sort=${sort})}"
         th:text="${i+1}"
         th:class="${i == currentPage} ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm'"></a>
    </span>
    <a th:if="${currentPage < totalPages-1}"
       th:href="@{/projects(page=${currentPage+1}, keyword=${keyword}, sort=${sort})}"
       class="btn btn-ghost btn-sm">다음 →</a>
  </div>

</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
