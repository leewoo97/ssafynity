<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('프로젝트', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Showcase</div>
        <h1>프로젝트</h1>
        <p>SSAFY 팀 프로젝트를 공유하고 피드백을 받아보세요</p>
      </div>
      <a th:href="@{/projects/new}" class="btn btn-blue btn-md" th:if="${session.loginMember != null}">🚀 프로젝트 등록</a>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <div th:if="${featuredProjects != null and !featuredProjects.isEmpty()}" style="margin-bottom:32px;">
      <div class="label" style="margin-bottom:14px;">✨ 추천 프로젝트</div>
      <div class="project-grid">
        <div th:each="p : ${featuredProjects}" class="project-card">
          <div th:if="${p.thumbnailUrl != null and !#strings.isEmpty(p.thumbnailUrl)}" class="project-thumb">
            <img th:src="${p.thumbnailUrl}" alt="thumbnail">
          </div>
          <div class="project-body">
            <div style="display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap;">
              <span class="pill pill-blue" th:text="${p.status == 'IN_PROGRESS'} ? '진행 중' : '완료'"></span>
            </div>
            <div class="project-title">
              <a th:href="@{/projects/{id}(id=${p.id})}" th:text="${p.title}"></a>
            </div>
            <div class="project-desc" th:text="${#strings.abbreviate(p.description,90)}"></div>
            <div class="project-tags" th:if="${p.techStack != null}">
              <span th:each="tech,ti : ${p.techStack.split(',')}" th:if="${ti.index < 4}">
                <span class="tag" th:text="${#strings.trim(tech)}"></span>
              </span>
            </div>
            <div class="project-meta">
              <span th:text="${p.author.nickname}"></span>
              <div style="display:flex;gap:8px;">
                <span>👥 <span th:text="${p.teamSize}"></span></span>
                <span>❤ <span th:text="${p.likeCount}"></span></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <form th:action="@{/projects}" method="get" class="search-row" style="margin-bottom:20px;">
      <input type="text" name="keyword" th:value="${keyword}" placeholder="프로젝트 검색..." class="search-input">
      <select name="sort" class="search-select">
        <option value="latest" th:selected="${sort == 'latest' or sort == null}">최신순</option>
        <option value="popular" th:selected="${sort == 'popular'}">인기순</option>
      </select>
      <button type="submit" class="btn btn-blue btn-md">검색</button>
    </form>

    <div th:if="${projects == null or projects.isEmpty()}" class="empty">
      <div class="empty-icon">🚀</div>
      <div class="empty-title">프로젝트가 없습니다.</div>
      <div class="empty-sub" style="margin-top:16px;" th:if="${session.loginMember != null}">
        <a th:href="@{/projects/new}" class="btn btn-blue btn-md">첫 프로젝트 등록하기</a>
      </div>
    </div>

    <div class="project-grid">
      <div th:each="p : ${projects}" class="project-card">
        <div th:if="${p.thumbnailUrl != null and !#strings.isEmpty(p.thumbnailUrl)}" class="project-thumb">
          <img th:src="${p.thumbnailUrl}" alt="thumbnail">
        </div>
        <div class="project-body">
          <div style="display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap;">
            <span class="pill" th:classappend="${p.status == 'IN_PROGRESS'} ? ' pill-blue' : ' pill-gray'"
                  th:text="${p.status == 'IN_PROGRESS'} ? '진행 중' : '완료'"></span>
          </div>
          <div class="project-title">
            <a th:href="@{/projects/{id}(id=${p.id})}" th:text="${p.title}"></a>
          </div>
          <div class="project-desc" th:text="${#strings.abbreviate(p.description,90)}"></div>
          <div class="project-tags" th:if="${p.techStack != null}">
            <span th:each="tech,ti : ${p.techStack.split(',')}" th:if="${ti.index < 4}">
              <span class="tag" th:text="${#strings.trim(tech)}"></span>
            </span>
          </div>
          <div class="project-meta">
            <span th:text="${p.author.nickname}"></span>
            <div style="display:flex;gap:8px;">
              <span>👥 <span th:text="${p.teamSize}"></span></span>
              <span>❤ <span th:text="${p.likeCount}"></span></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="pagination" th:if="${totalPages != null and totalPages > 1}">
      <a th:if="${currentPage > 0}"
         th:href="@{/projects(page=${currentPage-1},keyword=${keyword},sort=${sort})}">‹</a>
      <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <a th:href="@{/projects(page=${i},keyword=${keyword},sort=${sort})}"
           th:text="${i+1}" th:classappend="${i == currentPage} ? ' active' : ''"></a>
      </th:block>
      <a th:if="${currentPage < totalPages - 1}"
         th:href="@{/projects(page=${currentPage+1},keyword=${keyword},sort=${sort})}">›</a>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
