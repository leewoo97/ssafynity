<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${campus + ' 캠퍼스 게시판'}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">
          <a th:href="@{/campus/{c}(c=${campus})}" style="color:inherit;text-decoration:none;">
            <span th:text="${campusEmoji}"></span> <span th:text="${campus}"></span> 캠퍼스
          </a>
        </div>
        <h1>캠퍼스 게시판</h1>
        <p th:text="${campus + ' 캠퍼스 전용 커뮤니티 공간입니다'}"></p>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <a th:href="@{/campus/{c}(c=${campus})}" class="btn btn-outline btn-md">← 커뮤니티</a>
        <button class="btn btn-blue btn-md" onclick="toggleWriteForm()">✏️ 글쓰기</button>
      </div>
    </div>
  </div>
</div>

<div class="section-sm">
<div class="container">

  <!-- ══════════ 글쓰기 폼 (접힘/펼침) ══════════ -->
  <div id="writeForm" class="campus-write-form" style="display:none">
    <form th:action="@{/campus/{c}/board(c=${campus})}" method="post">
      <div class="campus-write-title">새 글 작성</div>
      <input type="text" name="title" placeholder="제목을 입력하세요" class="campus-write-input" required maxlength="100">
      <textarea name="content" placeholder="내용을 입력하세요" class="campus-write-textarea" rows="5" required></textarea>
      <div class="campus-write-actions">
        <button type="button" class="btn btn-outline btn-sm" onclick="toggleWriteForm()">취소</button>
        <button type="submit" class="btn btn-blue btn-sm">등록</button>
      </div>
    </form>
  </div>

  <!-- ══════════ 검색 ══════════ -->
  <form th:action="@{/campus/{c}/board(c=${campus})}" method="get" class="search-row" style="margin-bottom:20px;">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="게시글 검색..." class="search-input">
    <button type="submit" class="btn btn-blue btn-sm">검색</button>
    <a th:if="${keyword != null}" th:href="@{/campus/{c}/board(c=${campus})}" class="btn btn-outline btn-sm">초기화</a>
  </form>

  <!-- ══════════ 게시글 목록 ══════════ -->
  <div th:if="${posts.isEmpty()}" class="campus-empty">
    <div class="campus-empty-icon">📭</div>
    <p th:if="${keyword != null}">검색 결과가 없습니다.</p>
    <p th:unless="${keyword != null}" th:text="${campus + ' 캠퍼스 첫 번째 글을 작성해보세요!'}"></p>
    <button class="btn btn-blue btn-sm" onclick="toggleWriteForm(); document.getElementById('writeForm').scrollIntoView({behavior:'smooth'});">
      첫 번째 글 쓰기
    </button>
  </div>

  <div th:unless="${posts.isEmpty()}" class="board-list">
    <a th:each="post : ${posts.content}"
       th:href="@{/posts/{id}(id=${post.id})}"
       class="board-item">
      <div class="board-item-inner">
        <div class="board-item-main">
          <div class="board-item-title" th:text="${post.title}"></div>
          <div class="board-item-meta">
            <span class="board-item-author">
              <span th:if="${post.author.profileImageUrl != null}"
                    class="board-author-avatar"
                    th:style="'background-image:url(' + ${post.author.profileImageUrl} + ')'"></span>
              <span th:unless="${post.author.profileImageUrl != null}"
                    class="board-author-initial"
                    th:text="${#strings.substring(post.author.nickname,0,1)}"></span>
              <span th:text="${post.author.nickname}"></span>
            </span>
            <span class="board-item-time"
                  th:text="${#temporals.format(post.createdAt, 'MM/dd HH:mm')}"></span>
          </div>
        </div>
        <div class="board-item-stats">
          <span>👁 <span th:text="${post.viewCount}"></span></span>
          <span>❤️ <span th:text="${post.likeCount}"></span></span>
        </div>
      </div>
    </a>
  </div>

  <!-- ══════════ 페이지네이션 ══════════ -->
  <div th:if="${posts.totalPages > 1}" class="pagination" style="margin-top:28px;">
    <a th:unless="${posts.first}"
       th:href="@{/campus/{c}/board(c=${campus}, page=${currentPage - 1}, keyword=${keyword})}"
       class="page-btn">← 이전</a>

    <th:block th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}">
      <a th:href="@{/campus/{c}/board(c=${campus}, page=${i}, keyword=${keyword})}"
         class="page-btn"
         th:classappend="${i == currentPage} ? ' active' : ''"
         th:text="${i + 1}"></a>
    </th:block>

    <a th:unless="${posts.last}"
       th:href="@{/campus/{c}/board(c=${campus}, page=${currentPage + 1}, keyword=${keyword})}"
       class="page-btn">다음 →</a>
  </div>

</div><!-- /container -->
</div><!-- /section-sm -->

<style>
.campus-write-form {
  background: var(--card-bg);
  border: 1px solid var(--blue);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.campus-write-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.campus-write-input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 15px;
  margin-bottom: 10px;
  background: var(--bg);
  color: var(--text);
  box-sizing: border-box;
}
.campus-write-textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 14px;
  resize: vertical;
  background: var(--bg);
  color: var(--text);
  box-sizing: border-box;
  font-family: inherit;
  line-height: 1.6;
}
.campus-write-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }

.board-list { display: flex; flex-direction: column; gap: 8px; }
.board-item {
  display: block;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  text-decoration: none;
  color: var(--text);
  transition: box-shadow .15s, border-color .15s;
}
.board-item:hover { box-shadow: 0 2px 10px rgba(0,0,0,.07); border-color: var(--blue); }
.board-item-inner { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.board-item-main { flex: 1; min-width: 0; }
.board-item-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.board-item-meta { display: flex; gap: 12px; align-items: center; font-size: 13px; color: var(--text-muted); }
.board-item-author { display: flex; align-items: center; gap: 6px; }
.board-author-avatar, .board-author-initial {
  width: 22px; height: 22px; border-radius: 50%;
  background-size: cover; background-position: center;
  font-size: 10px; color: #fff; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.board-author-initial { background: var(--blue); }
.board-item-stats { display: flex; gap: 10px; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }

.campus-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.campus-empty-icon { font-size: 48px; margin-bottom: 12px; }

.pagination { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
.page-btn {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 36px; height: 36px; padding: 0 10px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; font-weight: 500; text-decoration: none; color: var(--text);
  background: var(--card-bg); transition: all .15s;
}
.page-btn:hover { border-color: var(--blue); color: var(--blue); }
.page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
</style>

<script>
function toggleWriteForm() {
  const form = document.getElementById('writeForm');
  if (form.style.display === 'none') {
    form.style.display = 'block';
    form.querySelector('input[name=title]').focus();
  } else {
    form.style.display = 'none';
  }
}
</script>

</th:block>
</body>
</html>
