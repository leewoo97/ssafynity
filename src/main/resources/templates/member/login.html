<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('로그인')}"></head>
<body style="min-height:100vh;display:flex;flex-direction:column;">
<div th:replace="~{fragments/layout :: topbar}"></div>

<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:2.5rem 1rem;background:var(--bg);">
  <div style="width:100%;max-width:440px;">
    <!-- Brand -->
    <div style="text-align:center;margin-bottom:2rem;">
      <a th:href="@{/}" style="font-size:2rem;font-weight:900;letter-spacing:-1.5px;text-decoration:none;color:var(--text);">
        SSAFY<span style="background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">nity</span>
      </a>
      <p style="color:var(--muted);font-size:.9rem;margin-top:.4rem;">개발자 커뮤니티에 오신 것을 환영합니다 👋</p>
    </div>

    <div class="card" style="padding:2rem 2.2rem;box-shadow:var(--shadow-md);">
      <h2 style="text-align:center;margin-bottom:1.5rem;font-size:1.35rem;font-weight:900;">🔐 로그인</h2>

      <div class="alert alert-error" th:if="${error}">
        ⚠️ <span th:text="${error}"></span>
      </div>

      <form th:action="@{/member/login}" method="post">
        <div class="form-group">
          <label>아이디</label>
          <input type="text" name="username" required placeholder="아이디를 입력하세요" autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" name="password" required placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:.5rem;">
          로그인 →
        </button>
      </form>

      <div class="divider">또는</div>

      <p style="text-align:center;color:var(--muted);font-size:.9rem;">
        계정이 없으신가요?
        <a th:href="@{/member/register}" style="font-weight:700;color:var(--primary);">회원가입 →</a>
      </p>
    </div>
  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
