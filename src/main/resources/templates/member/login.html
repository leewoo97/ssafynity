<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('로그인')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container" style="max-width:420px;">
  <div class="card">
    <h2 style="text-align:center; margin-bottom:1.5rem;">🔐 로그인</h2>
    <div class="alert alert-error" th:if="${error}">
      <span th:text="${error}"></span>
    </div>
    <form th:action="@{/member/login}" method="post">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" name="username" required placeholder="아이디를 입력하세요" autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" required placeholder="비밀번호를 입력하세요">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:.7rem;">로그인</button>
    </form>
    <p style="text-align:center; margin-top:1rem; color:var(--muted); font-size:.9rem;">
      계정이 없으신가요? <a th:href="@{/member/register}">회원가입</a>
    </p>
  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
