<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('로그인', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">S</div>
    <div class="auth-tagline">SSAFYnity</div>
    <h2 class="auth-title">로그인</h2>

    <div th:if="${error}" style="margin-bottom:16px;padding:12px 14px;background:rgba(255,59,48,.08);border-radius:var(--r-sm);color:var(--red);font-size:.88rem;" th:text="${error}"></div>

    <form th:action="@{/member/login}" method="post">
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input class="form-input" type="text" name="username" required placeholder="아이디 입력">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" type="password" name="password" required placeholder="비밀번호 입력">
      </div>
      <button type="submit" class="btn btn-blue btn-lg" style="width:100%;margin-top:8px;">로그인</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:.88rem;color:var(--t4);">
      계정이 없으신가요? <a th:href="@{/member/register}" style="color:var(--blue);font-weight:600;">회원가입</a>
    </p>
  </div>
</div>
</th:block>
</body>
</html>
