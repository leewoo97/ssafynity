<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${member.nickname} + ' 프로필', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">
<div class="section-sm">
  <div class="container">
    <div class="two-col">
      <div>
        <div class="card" style="text-align:center;padding:40px 28px;">
          <div class="av av-2xl" style="margin:0 auto 16px;"
               th:text="${#strings.substring(member.nickname,0,1)}">U</div>
          <div style="font-size:1.4rem;font-weight:700;color:var(--t1);" th:text="${member.nickname}"></div>
          <div style="font-size:.88rem;color:var(--t4);margin-top:4px;" th:text="${member.username}"></div>
          <div style="font-size:.88rem;color:var(--t3);margin-top:8px;line-height:1.5;"
               th:if="${member.bio != null and !#strings.isEmpty(member.bio)}" th:text="${member.bio}"></div>
          <div style="margin-top:20px;display:flex;justify-content:center;gap:32px;">
            <div>
              <div style="font-size:1.2rem;font-weight:700;color:var(--t1);" th:text="${posts != null ? posts.size() : 0}">0</div>
              <div style="font-size:.78rem;color:var(--t4);">게시글</div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="sidebar-block">
          <div class="sidebar-block-head">최근 게시글</div>
          <div class="sidebar-block-body">
            <div th:if="${posts == null or posts.isEmpty()}" style="padding:16px 18px;color:var(--t4);font-size:.85rem;">게시글이 없습니다.</div>
            <div th:each="post : ${posts}" class="sidebar-row">
              <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}" class="sidebar-row-title"></a>
              <span class="sidebar-row-meta" th:text="${#temporals.format(post.createdAt,'MM.dd')}"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</th:block>
</body>
</html>
