<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('회원가입', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">
<div class="auth-wrap">
  <div class="auth-card" style="max-width:480px;">
    <a th:href="@{/}" class="auth-logo">SSAFY<span>nity</span></a>
    <p class="auth-tagline">개발자 커뮤니티에 합류하세요 🚀</p>

    <h2 class="auth-title">회원가입</h2>

    <div class="alert alert-error" th:if="${error}">
      <span>⚠️</span><span th:text="${error}"></span>
    </div>

    <form th:action="@{/member/register}" method="post">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">아이디</label>
          <input class="form-input" type="text" name="username" required
                 placeholder="영문/숫자 4~20자" autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">닉네임</label>
          <input class="form-input" type="text" name="nickname" required
                 placeholder="커뮤니티 닉네임" autocomplete="nickname">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">이름</label>
        <input class="form-input" type="text" name="name" required placeholder="실명">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" type="password" name="password" required
               placeholder="8자 이상의 비밀번호" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">이메일 <span style="font-weight:400;color:var(--t5);">(선택)</span></label>
        <input class="form-input" type="email" name="email" placeholder="example@email.com">
      </div>
      <button type="submit" class="btn btn-blue btn-lg" style="width:100%;margin-top:4px;">가입하기</button>
    </form>

    <div class="divider">또는</div>

    <p style="text-align:center;font-size:.88rem;color:var(--t4);">
      이미 계정이 있으신가요?
      <a th:href="@{/member/login}" style="font-weight:600;color:var(--blue);">로그인 →</a>
    </p>
  </div>
</div>
</th:block>
</body>
</html>
