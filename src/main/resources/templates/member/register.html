<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('회원가입')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container" style="max-width:480px;">
  <div class="card">
    <h2 style="text-align:center; margin-bottom:1.5rem;">📝 회원가입</h2>
    <div class="alert alert-error" th:if="${error}">
      <span th:text="${error}"></span>
    </div>
    <form th:action="@{/member/register}" method="post">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" name="username" required placeholder="영문/숫자 4~20자" autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" required placeholder="8자 이상">
      </div>
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" name="nickname" required placeholder="커뮤니티에서 사용할 이름">
      </div>
      <div class="form-group">
        <label>이메일 <span style="color:var(--muted); font-size:.85rem;">(선택)</span></label>
        <input type="email" name="email" placeholder="example@email.com">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:.7rem;">가입하기</button>
    </form>
    <p style="text-align:center; margin-top:1rem; color:var(--muted); font-size:.9rem;">
      이미 계정이 있으신가요? <a th:href="@{/member/login}">로그인</a>
    </p>
  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
