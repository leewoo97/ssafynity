<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('회원가입')}"></head>
<body style="min-height:100vh;display:flex;flex-direction:column;">
<div th:replace="~{fragments/layout :: topbar}"></div>

<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:2.5rem 1rem;background:var(--bg);">
  <div style="width:100%;max-width:480px;">
    <!-- Brand -->
    <div style="text-align:center;margin-bottom:2rem;">
      <a th:href="@{/}" style="font-size:2rem;font-weight:900;letter-spacing:-1.5px;text-decoration:none;color:var(--text);">
        SSAFY<span style="background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">nity</span>
      </a>
      <p style="color:var(--muted);font-size:.9rem;margin-top:.4rem;">개발자 커뮤니티에 합류하세요 🚀</p>
    </div>

    <div class="card" style="padding:2rem 2.2rem;box-shadow:var(--shadow-md);">
      <h2 style="text-align:center;margin-bottom:1.5rem;font-size:1.35rem;font-weight:900;">📝 회원가입</h2>

      <div class="alert alert-error" th:if="${error}">
        ⚠️ <span th:text="${error}"></span>
      </div>

      <form th:action="@{/member/register}" method="post">
        <div class="form-row">
          <div class="form-group">
            <label>아이디</label>
            <input type="text" name="username" required placeholder="영문/숫자 4~20자" autofocus autocomplete="username">
          </div>
          <div class="form-group">
            <label>닉네임</label>
            <input type="text" name="nickname" required placeholder="커뮤니티 닉네임" autocomplete="nickname">
          </div>
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" name="password" required placeholder="8자 이상의 비밀번호" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>이메일 <span style="color:var(--muted);font-size:.8rem;font-weight:500;text-transform:none;">(선택)</span></label>
          <input type="email" name="email" placeholder="example@email.com" autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:.5rem;">
          🚀 가입하기
        </button>
      </form>

      <div class="divider">또는</div>

      <p style="text-align:center;color:var(--muted);font-size:.9rem;">
        이미 계정이 있으신가요?
        <a th:href="@{/member/login}" style="font-weight:700;color:var(--primary);">로그인 →</a>
      </p>
    </div>
  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
