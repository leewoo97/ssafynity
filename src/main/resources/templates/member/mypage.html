<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('마이페이지', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">
<div class="section-sm">
  <div class="container">
    <!-- Profile hero -->
    <div class="profile-hero">
      <div class="av av-2xl" th:text="${#strings.substring(member.nickname,0,1)}">U</div>
      <div class="profile-hero-info">
        <div style="font-size:1.5rem;font-weight:700;color:var(--t1);letter-spacing:-.025em;"
             th:text="${member.nickname}"></div>
        <div style="font-size:.88rem;color:var(--t4);margin-top:4px;" th:text="${member.username}"></div>
        <div style="font-size:.82rem;color:var(--t5);margin-top:2px;"
             th:if="${member.email != null}" th:text="${member.email}"></div>
        <div style="font-size:.88rem;color:var(--t3);margin-top:6px;line-height:1.55;"
             th:if="${member.bio != null and !#strings.isEmpty(member.bio)}"
             th:text="${member.bio}"></div>
      </div>
      <div style="margin-left:auto;flex-shrink:0;">
        <a th:href="@{/profile/edit}" class="btn btn-ghost btn-sm">✏️ 프로필 수정</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="profile-stat-row">
      <div class="profile-stat">
        <div class="profile-stat-num" th:text="${myPosts != null ? myPosts.size() : 0}">0</div>
        <div class="profile-stat-lbl">게시글</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num" th:text="${myComments != null ? myComments.size() : 0}">0</div>
        <div class="profile-stat-lbl">댓글</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num" th:text="${myFriends != null ? myFriends.size() : 0}">0</div>
        <div class="profile-stat-lbl">친구</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs" style="margin-top:24px;">
      <a href="?tab=posts" class="tab" th:classappend="${tab == null or tab == 'posts'} ? ' active' : ''">내 게시글</a>
      <a href="?tab=comments" class="tab" th:classappend="${tab == 'comments'} ? ' active' : ''">내 댓글</a>
      <a href="?tab=friends" class="tab" th:classappend="${tab == 'friends'} ? ' active' : ''">
        친구
        <span th:if="${pendingRequests != null and !pendingRequests.isEmpty()}"
              style="display:inline-block;background:var(--red);color:#fff;border-radius:10px;padding:0 6px;font-size:.75rem;font-weight:700;margin-left:4px;"
              th:text="${pendingRequests.size()}"></span>
      </a>
    </div>

    <!-- Posts tab -->
    <div th:if="${tab == null or tab == 'posts'}">
      <div th:if="${myPosts == null or myPosts.isEmpty()}" class="empty" style="margin-top:24px;">
        <div class="empty-icon">📝</div>
        <div class="empty-title">작성한 게시글이 없습니다.</div>
      </div>
      <div class="card card-flush" th:unless="${myPosts == null or myPosts.isEmpty()}" style="margin-top:16px;">
        <table class="table">
          <thead><tr><th>제목</th><th>카테고리</th><th>작성일</th><th>조회</th></tr></thead>
          <tbody>
            <tr th:each="post : ${myPosts}">
              <td><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}" class="table-link"></a></td>
              <td><span class="pill pill-gray" th:text="${post.category}"></span></td>
              <td th:text="${#temporals.format(post.createdAt,'yyyy.MM.dd')}"></td>
              <td th:text="${post.viewCount}"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Comments tab -->
    <div th:if="${tab == 'comments'}">
      <div th:if="${myComments == null or myComments.isEmpty()}" class="empty" style="margin-top:24px;">
        <div class="empty-icon">💬</div>
        <div class="empty-title">작성한 댓글이 없습니다.</div>
      </div>
      <div class="card card-flush" th:unless="${myComments == null or myComments.isEmpty()}" style="margin-top:16px;">
        <table class="table">
          <thead><tr><th>댓글 내용</th><th>게시글</th><th>작성일</th></tr></thead>
          <tbody>
            <tr th:each="comment : ${myComments}">
              <td th:text="${comment.content}"></td>
              <td><a th:href="@{/posts/{id}(id=${comment.post.id})}" th:text="${comment.post.title}" class="table-link"></a></td>
              <td th:text="${#temporals.format(comment.createdAt,'yyyy.MM.dd')}"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Friends tab -->
    <div th:if="${tab == 'friends'}">

      <!-- 받은 친구 요청 -->
      <div th:if="${pendingRequests != null and !pendingRequests.isEmpty()}" style="margin-top:24px;">
        <div style="font-size:.9rem;font-weight:700;color:var(--t2);margin-bottom:12px;">📬 받은 친구 요청</div>
        <div class="card card-flush">
          <div th:each="req : ${pendingRequests}"
               style="display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--b1);">
            <div class="av" th:text="${#strings.substring(req.requester.nickname,0,1)}">U</div>
            <div style="flex:1;">
              <a th:href="@{/profile/{id}(id=${req.requester.id})}"
                 th:text="${req.requester.nickname}"
                 style="font-weight:600;color:var(--t1);text-decoration:none;"></a>
              <div style="font-size:.8rem;color:var(--t5);" th:text="${req.requester.campus != null ? req.requester.campus + (req.requester.cohort != null ? ' ' + req.requester.cohort + '기' : '') : ''}"></div>
            </div>
            <div style="display:flex;gap:8px;">
              <form th:action="@{/friends/accept/{id}(id=${req.id})}" method="post">
                <button type="submit" class="btn btn-blue btn-sm">수락</button>
              </form>
              <form th:action="@{/friends/reject/{id}(id=${req.id})}" method="post">
                <button type="submit" class="btn btn-ghost btn-sm">거절</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- 친구 목록 -->
      <div style="margin-top:24px;">
        <div style="font-size:.9rem;font-weight:700;color:var(--t2);margin-bottom:12px;">
          👥 친구 목록 <span style="font-weight:400;color:var(--t5);" th:text="'(' + (${myFriends != null ? myFriends.size() : 0}) + '명)'"></span>
        </div>
        <div th:if="${myFriends == null or myFriends.isEmpty()}" class="empty">
          <div class="empty-icon">👤</div>
          <div class="empty-title">아직 친구가 없습니다.</div>
          <div class="empty-desc">캠퍼스 커뮤니티나 프로필 페이지에서 친구를 추가해보세요!</div>
        </div>
        <div th:unless="${myFriends == null or myFriends.isEmpty()}"
             style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;">
          <div th:each="friend : ${myFriends}"
               class="card"
               style="text-align:center;padding:20px 12px;">
            <a th:href="@{/profile/{id}(id=${friend.id})}" style="text-decoration:none;">
              <div class="av av-lg" style="margin:0 auto 10px;"
                   th:text="${#strings.substring(friend.nickname,0,1)}">U</div>
              <div style="font-weight:600;font-size:.9rem;color:var(--t1);" th:text="${friend.nickname}"></div>
              <div style="font-size:.78rem;color:var(--t5);margin-top:2px;"
                   th:if="${friend.campus != null}"
                   th:text="${friend.campus + (friend.cohort != null ? ' ' + friend.cohort + '기' : '')}"></div>
            </a>
            <form th:action="@{/dm/start/{id}(id=${friend.id})}" method="post" style="margin-top:10px;">
              <button type="submit" class="btn btn-ghost btn-sm" style="width:100%;">💬 DM</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</th:block>
</body>
</html>
