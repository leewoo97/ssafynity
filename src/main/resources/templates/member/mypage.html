<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('마이페이지')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container">
  <div class="two-col">

    <!-- 왼쪽: 프로필 카드 -->
    <aside>
      <div class="card" style="text-align:center;padding:2rem 1.5rem;">
        <div class="avatar-lg" th:text="${member.nickname?.substring(0,1)?.toUpperCase()}">U</div>
        <h2 style="font-size:1.3rem;font-weight:900;margin-bottom:.3rem;" th:text="${member.nickname}">닉네임</h2>
        <p style="color:var(--muted);font-size:.88rem;margin-bottom:.8rem;" th:text="'@' + ${member.username}">@username</p>
        <p style="font-size:.93rem;line-height:1.65;color:var(--text-sub);margin-bottom:1rem;"
           th:text="${member.bio ?: '자기소개가 없습니다.'}"></p>
        <div style="display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:1rem;">
          <span th:if="${member.email}" style="display:inline-flex;align-items:center;gap:.3rem;background:var(--bg);border-radius:20px;padding:.3rem .8rem;font-size:.8rem;color:var(--muted);">✉ <span th:text="${member.email}"></span></span>
          <span style="display:inline-flex;align-items:center;gap:.3rem;background:var(--bg);border-radius:20px;padding:.3rem .8rem;font-size:.8rem;color:var(--muted);">📅 <span th:text="${#temporals.format(member.createdAt, 'yyyy.MM.dd')}"></span></span>
        </div>
        <div style="display:flex;gap:.6rem;justify-content:center;">
          <a th:href="@{/profile/edit}" class="btn btn-primary btn-sm">✏ 프로필 편집</a>
          <a th:href="@{/bookmarks}" class="btn btn-ghost btn-sm">🔖 북마크</a>
        </div>
      </div>

      <div class="sidebar-card" style="margin-top:1rem;">
        <h4>📊 내 활동 통계</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-top:.8rem;">
          <div style="text-align:center;background:var(--bg);border-radius:10px;padding:.9rem .5rem;">
            <div style="font-size:1.6rem;font-weight:900;background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;" th:text="${myPosts.size()}">0</div>
            <div style="font-size:.77rem;color:var(--muted);font-weight:700;margin-top:.2rem;">게시글</div>
          </div>
          <div style="text-align:center;background:var(--bg);border-radius:10px;padding:.9rem .5rem;">
            <div style="font-size:1.6rem;font-weight:900;background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;" th:text="${myComments.size()}">0</div>
            <div style="font-size:.77rem;color:var(--muted);font-weight:700;margin-top:.2rem;">댓글</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- 오른쪽: 게시글/댓글 목록 -->
    <section>
      <!-- 내 게시글 -->
      <div class="card" style="margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1rem; font-size:1.1rem;">📄 내 게시글</h3>
        <div th:if="${myPosts.isEmpty()}" style="text-align:center; padding:2rem; color:var(--muted);">
          작성한 게시글이 없습니다.
        </div>
        <div class="table-wrap" th:if="${!myPosts.isEmpty()}">
          <table>
            <thead>
              <tr>
                <th style="width:60px;">카테고리</th>
                <th>제목</th>
                <th style="width:80px;">조회</th>
                <th style="width:80px;">추천</th>
                <th style="width:100px;">날짜</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="post : ${myPosts}">
                <td>
                  <span class="cat-badge" th:text="${post.category}"></span>
                </td>
                <td>
                  <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}"></a>
                </td>
                <td th:text="${post.viewCount}"></td>
                <td th:text="${post.likeCount}"></td>
                <td style="color:var(--muted); font-size:.85rem;"
                    th:text="${#temporals.format(post.createdAt,'MM.dd')}"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 내 댓글 -->
      <div class="card">
        <h3 style="margin-bottom:1rem;font-size:1.1rem;">💬 내 댓글</h3>
        <div th:if="${myComments.isEmpty()}" class="empty-msg">작성한 댓글이 없습니다.</div>
        <ul class="comment-list">
          <li th:each="comment : ${myComments}" class="comment-item">
            <div class="comment-avatar" th:text="${member.nickname?.substring(0,1)?.toUpperCase()}"></div>
            <div class="comment-body">
              <div class="comment-header">
                <a th:href="@{/posts/{id}(id=${comment.post.id})}"
                   th:text="${comment.post.title}" style="font-weight:700;color:var(--primary);font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px;display:block;"></a>
                <span class="comment-date" th:text="${#temporals.format(comment.createdAt,'MM.dd HH:mm')}"></span>
              </div>
              <p class="comment-content" th:text="${comment.content}"></p>
            </div>
          </li>
        </ul>
      </div>
    </section>

  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
