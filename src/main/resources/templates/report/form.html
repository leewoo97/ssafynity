<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('신고', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <h1>콘텐츠 신고</h1>
    <p>문제가 있는 콘텐츠를 신고해주세요</p>
  </div>
</div>

<div class="section-sm">
  <div class="container-sm">
    <div class="card">
      <form th:action="@{/report}" method="post">
        <input type="hidden" name="targetType" th:value="${targetType}">
        <input type="hidden" name="targetId" th:value="${targetId}">

        <div class="form-group">
          <label class="form-label">신고 대상</label>
          <div style="padding:10px 14px;background:var(--surface-2);border-radius:var(--r-sm);font-size:.88rem;color:var(--t3);">
            <span th:text="${targetType}"></span> #<span th:text="${targetId}"></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">신고 사유</label>
          <select name="reason" class="form-select" required>
            <option value="">-- 사유를 선택하세요 --</option>
            <option value="SPAM">스팸 / 광고</option>
            <option value="INAPPROPRIATE">부적절한 내용</option>
            <option value="HARASSMENT">혐오 / 욕설</option>
            <option value="COPYRIGHT">저작권 침해</option>
            <option value="MISINFORMATION">허위 정보</option>
            <option value="OTHER">기타</option>
          </select>
        </div>

        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:24px;">
          <a href="javascript:history.back();" class="btn btn-ghost btn-md">취소</a>
          <button type="submit" class="btn btn-danger btn-md">신고하기</button>
        </div>
      </form>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
