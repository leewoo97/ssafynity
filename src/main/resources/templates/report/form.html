<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('신고하기')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container" style="max-width:520px;">
  <div class="card">
    <h2 style="margin-bottom:.4rem;">🚨 신고하기</h2>
    <p style="color:var(--muted); font-size:.9rem; margin-bottom:1.4rem;">
      허위 신고 시 이용이 제한될 수 있습니다.
    </p>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/report}" method="post">
      <input type="hidden" name="targetType" th:value="${targetType}">
      <input type="hidden" name="targetId" th:value="${targetId}">

      <div class="form-group">
        <label>신고 대상</label>
        <div style="padding:.7rem; background:var(--bg); border-radius:var(--radius);
                    border:1px solid var(--border); font-size:.9rem; color:var(--muted);">
          <span th:text="${targetType == 'POST'} ? '게시글' : '댓글'"></span>
          &nbsp;#<span th:text="${targetId}"></span>
        </div>
      </div>

      <div class="form-group">
        <label>신고 사유</label>
        <select name="reason" required>
          <option value="" disabled selected>사유를 선택해주세요</option>
          <option value="욕설/비방">욕설/비방</option>
          <option value="스팸/광고">스팸/광고</option>
          <option value="음란물">음란물</option>
          <option value="개인정보 노출">개인정보 노출</option>
          <option value="저작권 침해">저작권 침해</option>
          <option value="허위 정보">허위 정보</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div style="display:flex; gap:.8rem;">
        <button type="submit" class="btn btn-danger">신고 접수</button>
        <a href="javascript:history.back()" class="btn btn-ghost">취소</a>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
