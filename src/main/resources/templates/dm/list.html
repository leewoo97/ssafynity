<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('메시지', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="section-sm">
  <div class="container" style="max-width:760px;">

    <!-- 헤더 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div>
        <h1 style="font-size:1.5rem;font-weight:800;color:var(--t1);margin:0;">💬 메시지</h1>
        <div style="font-size:.82rem;color:var(--t5);margin-top:2px;">친구들과 대화하세요</div>
      </div>
      <button class="btn btn-blue btn-md" onclick="document.getElementById('groupModal').style.display='flex'">
        + 그룹 채팅
      </button>
    </div>

    <!-- 대화 목록 -->
    <div class="card card-flush">
      <div th:if="${rooms == null or rooms.isEmpty()}"
           style="padding:48px 24px;text-align:center;color:var(--t4);">
        <div style="font-size:2rem;margin-bottom:12px;">💬</div>
        <div style="font-weight:600;margin-bottom:6px;">아직 대화가 없습니다</div>
        <div style="font-size:.85rem;">친구 프로필에서 메시지를 보내보세요!</div>
        <a th:href="@{/profile/me?tab=friends}" class="btn btn-blue btn-sm" style="margin-top:16px;">내 친구 목록</a>
      </div>

      <div th:each="room : ${rooms}" class="dm-room-row"
           th:onclick="'location.href=\'/dm/' + ${room.id} + '\''">

        <!-- DM: 상대방 아바타 -->
        <th:block th:if="${room.type == 'DM'}">
          <th:block th:with="other=${dmOtherMember[room.id]}">
            <div class="dm-avatar">
              <div th:if="${other != null and other.profileImageUrl != null}"
                   class="dm-avatar-img"
                   th:style="'background-image:url(' + ${other.profileImageUrl} + ')'"></div>
              <div th:unless="${other != null and other.profileImageUrl != null}"
                   class="dm-avatar-initial"
                   th:text="${other != null ? #strings.substring(other.nickname,0,1) : '?'}">?</div>
            </div>
            <div class="dm-room-info">
              <div class="dm-room-name" th:text="${other != null ? other.nickname : '(알 수 없음)'}"></div>
              <div class="dm-room-preview"
                   th:if="${lastMessages[room.id] != null}"
                   th:text="${lastMessages[room.id].content}"></div>
              <div class="dm-room-preview" th:unless="${lastMessages[room.id] != null}"
                   style="color:var(--t5);font-style:italic;">대화를 시작해보세요</div>
            </div>
          </th:block>
        </th:block>

        <!-- GROUP: 그룹 아이콘 -->
        <th:block th:if="${room.type == 'GROUP'}">
          <div class="dm-avatar dm-avatar-group">
            <span>👥</span>
          </div>
          <div class="dm-room-info">
            <div class="dm-room-name">
              <span th:text="${room.name}"></span>
              <span class="dm-group-count"
                    th:text="'(' + ${roomMembers[room.id] != null ? roomMembers[room.id].size() : 0} + '명)'"></span>
            </div>
            <div class="dm-room-preview"
                 th:if="${lastMessages[room.id] != null}">
              <span th:text="${lastMessages[room.id].sender != null ? lastMessages[room.id].sender.nickname + ': ' : ''}"
                    style="color:var(--t5)"></span>
              <span th:text="${lastMessages[room.id].content}"></span>
            </div>
            <div class="dm-room-preview" th:unless="${lastMessages[room.id] != null}"
                 style="color:var(--t5);font-style:italic;">대화를 시작해보세요</div>
          </div>
        </th:block>

        <div class="dm-room-time"
             th:if="${lastMessages[room.id] != null}"
             th:text="${#temporals.format(lastMessages[room.id].createdAt, 'MM.dd HH:mm')}"></div>
      </div>
    </div>
  </div>
</div>

<!-- 그룹 채팅 생성 모달 -->
<div id="groupModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;">
  <div class="card" style="width:min(480px,90vw);padding:28px;position:relative;">
    <button onclick="document.getElementById('groupModal').style.display='none'"
            style="position:absolute;top:14px;right:14px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--t4);">✕</button>
    <div style="font-size:1.1rem;font-weight:700;color:var(--t1);margin-bottom:20px;">👥 새 그룹 채팅</div>

    <form th:action="@{/dm/group}" method="post">
      <div class="form-group">
        <label class="form-label">그룹 이름 <span style="color:var(--red)">*</span></label>
        <input class="form-input" type="text" name="name" required placeholder="그룹 채팅 이름">
      </div>

      <div class="form-group">
        <label class="form-label">초대할 친구</label>
        <div th:if="${myFriends == null or myFriends.isEmpty()}"
             style="font-size:.85rem;color:var(--t5);padding:8px 0;">친구가 없습니다.</div>
        <div style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;">
          <label th:each="friend : ${myFriends}"
                 style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-sm);cursor:pointer;transition:background .15s;"
                 onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">
            <input type="checkbox" name="memberIds" th:value="${friend.id}" style="margin:0;">
            <div class="av av-sm" th:text="${#strings.substring(friend.nickname,0,1)}">U</div>
            <span style="font-size:.9rem;font-weight:500;" th:text="${friend.nickname}"></span>
          </label>
        </div>
      </div>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button type="button" class="btn btn-ghost btn-md"
                onclick="document.getElementById('groupModal').style.display='none'">취소</button>
        <button type="submit" class="btn btn-blue btn-md">만들기</button>
      </div>
    </form>
  </div>
</div>

<style>
.dm-room-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.dm-room-row:last-child { border-bottom: none; }
.dm-room-row:hover { background: var(--surface-2); }

.dm-avatar {
  flex-shrink: 0;
  width: 48px; height: 48px;
  border-radius: 50%;
  overflow: hidden;
}
.dm-avatar-img {
  width: 100%; height: 100%;
  background-size: cover; background-position: center;
}
.dm-avatar-initial {
  width: 100%; height: 100%;
  background: var(--blue);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1.1rem;
}
.dm-avatar-group {
  background: rgba(37,99,235,.1);
  color: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
}
.dm-room-info { flex: 1; min-width: 0; }
.dm-room-name {
  font-weight: 600; font-size: .92rem; color: var(--t1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dm-group-count { font-weight:400; color: var(--t4); font-size: .82rem; margin-left: 4px; }
.dm-room-preview {
  font-size: .82rem; color: var(--t4); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dm-room-time { font-size: .75rem; color: var(--t5); flex-shrink: 0; }
</style>

</th:block>
</body>
</html>
