<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${roomTitle}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<!-- SockJS + STOMP CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6.1.2/bundles/stomp.umd.min.js"></script>

<div style="display:flex;height:calc(100vh - 64px);overflow:hidden;">

  <!-- ════ 채팅 영역 ════ -->
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">

    <!-- 채팅 헤더 -->
    <div class="dm-chat-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <a th:href="@{/dm}" class="btn btn-ghost btn-sm" style="padding:4px 10px;font-size:1rem;">‹</a>

        <!-- DM: 상대방 아바타 -->
        <th:block th:if="${room.type == 'DM' and otherMember != null}">
          <div class="dm-h-avatar">
            <div th:if="${otherMember.profileImageUrl != null}"
                 class="dm-h-avatar-img"
                 th:style="'background-image:url(' + ${otherMember.profileImageUrl} + ')'"></div>
            <div th:unless="${otherMember.profileImageUrl != null}"
                 class="dm-h-avatar-init"
                 th:text="${#strings.substring(otherMember.nickname,0,1)}">U</div>
          </div>
        </th:block>
        <!-- GROUP: 아이콘 -->
        <th:block th:if="${room.type == 'GROUP'}">
          <div class="dm-h-avatar" style="background:rgba(37,99,235,.1);color:var(--blue);font-size:1.1rem;display:flex;align-items:center;justify-content:center;">👥</div>
        </th:block>

        <div>
          <div style="font-weight:700;font-size:.95rem;color:var(--t1);" th:text="${roomTitle}"></div>
          <div style="font-size:.75rem;color:var(--t5);"
               th:if="${room.type == 'GROUP'}"
               th:text="${members.size() + '명 참여 중'}"></div>
        </div>
      </div>

      <!-- 우측 버튼: 그룹이면 멤버 토글 + 나가기, DM이면 나가기만 -->
      <div style="display:flex;align-items:center;gap:8px;">
        <button th:if="${room.type == 'GROUP'}"
                class="btn btn-ghost btn-sm" id="toggleSidebarBtn"
                onclick="toggleSidebar()">👥 멤버</button>
        <form th:action="@{/dm/{id}/leave(id=${room.id})}" method="post"
              onsubmit="return confirm('정말 나가시겠습니까?')">
          <button type="submit" class="btn btn-ghost btn-sm" style="color:var(--red);">나가기</button>
        </form>
      </div>
    </div>

    <!-- 메시지 영역 -->
    <div class="dm-messages" id="dmMessages">

      <!-- 이전 메시지 (DB) -->
      <th:block th:each="msg : ${messages}">
        <div th:if="${msg.sender != null}"
             class="dm-msg"
             th:classappend="${msg.sender.id == loginMember.id} ? ' mine' : ' theirs'">
          <div class="dm-msg-inner">
            <div class="dm-msg-name"
                 th:unless="${msg.sender.id == loginMember.id}"
                 th:text="${msg.sender.nickname}"></div>
            <div class="dm-bubble" th:text="${msg.content}"></div>
            <div class="dm-msg-time"
                 th:text="${#temporals.format(msg.createdAt, 'HH:mm')}"></div>
          </div>
        </div>
      </th:block>

      <!-- 메시지 없을 때 -->
      <div th:if="${messages == null or messages.isEmpty()}"
           style="text-align:center;color:var(--t5);padding:40px 20px;font-size:.85rem;">
        첫 메시지를 보내보세요! 👋
      </div>
    </div>

    <!-- 입력창 -->
    <div class="dm-input-bar">
      <input type="text" id="msgInput" class="form-input"
             placeholder="메시지를 입력하세요..." autocomplete="off"
             style="flex:1;" onkeydown="if(event.key==='Enter'&&!event.shiftKey){sendMsg();event.preventDefault();}">
      <button class="btn btn-blue btn-sm" onclick="sendMsg()">전송</button>
    </div>
  </div>

  <!-- ════ 사이드바: 그룹 멤버 목록 (GROUP only) ════ -->
  <div id="dmSidebar" th:if="${room.type == 'GROUP'}"
       style="width:220px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--card-bg);flex-shrink:0;">

    <div style="padding:16px;font-weight:700;font-size:.85rem;color:var(--t3);border-bottom:1px solid var(--border);">
      참여자 <span style="color:var(--blue);" th:text="${members.size()}"></span>명
    </div>

    <!-- 멤버 목록 -->
    <div style="flex:1;overflow-y:auto;padding:8px 0;">
      <div th:each="m : ${members}"
           style="display:flex;align-items:center;gap:8px;padding:8px 14px;">
        <div class="av av-sm" th:text="${#strings.substring(m.nickname,0,1)}">U</div>
        <div>
          <div style="font-size:.85rem;font-weight:600;color:var(--t1);" th:text="${m.nickname}"></div>
          <div th:if="${m.id == room.creator.id}"
               style="font-size:.72rem;color:var(--blue);">방장</div>
        </div>
      </div>
    </div>

    <!-- 친구 초대 -->
    <div th:if="${invitableFriends != null and !invitableFriends.isEmpty()}"
         style="padding:12px;border-top:1px solid var(--border);">
      <button class="btn btn-ghost btn-sm" style="width:100%;"
              onclick="document.getElementById('inviteModal').style.display='flex'">
        + 친구 초대
      </button>
    </div>
  </div>
</div>

<!-- 초대 모달 -->
<div id="inviteModal" th:if="${room.type == 'GROUP'}"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;">
  <div class="card" style="width:min(400px,90vw);padding:24px;position:relative;">
    <button onclick="document.getElementById('inviteModal').style.display='none'"
            style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--t4);">✕</button>
    <div style="font-weight:700;margin-bottom:16px;">친구 초대</div>
    <div th:each="friend : ${invitableFriends}"
         style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="av av-sm" th:text="${#strings.substring(friend.nickname,0,1)}">U</div>
        <span style="font-size:.9rem;font-weight:500;" th:text="${friend.nickname}"></span>
      </div>
      <form th:action="@{/dm/{rid}/invite/{mid}(rid=${room.id},mid=${friend.id})}" method="post">
        <button type="submit" class="btn btn-blue btn-sm">초대</button>
      </form>
    </div>
    <div th:if="${invitableFriends == null or invitableFriends.isEmpty()}"
         style="font-size:.85rem;color:var(--t5);">초대할 친구가 없습니다.</div>
  </div>
</div>

<!-- WebSocket + STOMP 스크립트 -->
<script th:inline="javascript">
  const roomId  = /*[[${room.id}]]*/  0;
  const myId    = /*[[${loginMember.id}]]*/  0;
  const myNick  = /*[[${loginMember.nickname}]]*/ '';

  const client = new StompJs.Client({
    webSocketFactory: () => new SockJS('/ws'),
    reconnectDelay: 5000,
    debug: () => {}
  });

  client.onConnect = function () {
    // DM 채널 구독
    client.subscribe('/topic/dm/' + roomId, function (frame) {
      const data = JSON.parse(frame.body);
      if (data.type === 'CHAT') {
        appendMsg(data, data.senderId === myId);
      } else if (data.type === 'JOIN') {
        appendSystemMsg(data.content);
      }
    });

    // 입장 알림
    client.publish({
      destination: '/app/dm.join',
      body: JSON.stringify({ roomId: roomId, channel: 'DM' })
    });
  };

  client.onDisconnect = function () {
    console.log('[DM] WebSocket disconnected');
  };

  client.activate();

  function sendMsg() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text || !client.connected) return;
    client.publish({
      destination: '/app/dm.send',
      body: JSON.stringify({
        type:    'CHAT',
        channel: 'DM',
        roomId:  roomId,
        senderId: myId,
        senderNickname: myNick,
        content: text
      })
    });
    input.value = '';
  }

  function appendMsg(data, isMine) {
    const box  = document.getElementById('dmMessages');
    const wrap = document.createElement('div');
    wrap.className = 'dm-msg ' + (isMine ? 'mine' : 'theirs');
    const time = data.timestamp ? data.timestamp.substring(11, 16) : '';
    wrap.innerHTML = `
      <div class="dm-msg-inner">
        ${!isMine ? `<div class="dm-msg-name">${escHtml(data.senderNickname)}</div>` : ''}
        <div class="dm-bubble">${escHtml(data.content)}</div>
        <div class="dm-msg-time">${time}</div>
      </div>`;
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
  }

  function appendSystemMsg(text) {
    const box  = document.getElementById('dmMessages');
    const el   = document.createElement('div');
    el.style.cssText = 'text-align:center;font-size:.75rem;color:var(--t5);padding:6px 0;';
    el.textContent   = text;
    box.appendChild(el);
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toggleSidebar() {
    const sb = document.getElementById('dmSidebar');
    if (sb) sb.style.display = (sb.style.display === 'none' ? '' : 'none');
  }

  // 초기 스크롤
  window.addEventListener('load', () => {
    const box = document.getElementById('dmMessages');
    box.scrollTop = box.scrollHeight;
  });
</script>

<style>
.dm-chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--card-bg);
  position: sticky;
  top: 64px;
  z-index: 10;
}
.dm-h-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
}
.dm-h-avatar-img {
  width: 100%; height: 100%;
  background-size: cover; background-position: center;
}
.dm-h-avatar-init {
  width: 100%; height: 100%;
  background: var(--blue);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .95rem;
}

.dm-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: var(--bg);
}

.dm-msg { display: flex; }
.dm-msg.mine  { justify-content: flex-end; }
.dm-msg.theirs{ justify-content: flex-start; }

.dm-msg-inner { max-width: 68%; }
.dm-msg.mine  .dm-msg-inner { align-items: flex-end; display: flex; flex-direction: column; }
.dm-msg.theirs .dm-msg-inner { align-items: flex-start; display: flex; flex-direction: column; }

.dm-msg-name {
  font-size: .72rem;
  font-weight: 600;
  color: var(--t4);
  margin-bottom: 2px;
  padding-left: 4px;
}

.dm-bubble {
  padding: 9px 13px;
  border-radius: 16px;
  font-size: .88rem;
  line-height: 1.45;
  word-break: break-word;
}
.dm-msg.mine   .dm-bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
.dm-msg.theirs .dm-bubble { background: var(--card-bg); color: var(--t1); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.dm-msg-time {
  font-size: .68rem;
  color: var(--t5);
  margin-top: 2px;
  padding: 0 4px;
}

.dm-input-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  background: var(--card-bg);
}
</style>

</th:block>
</body>
</html>
