<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('알림', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <h1>알림</h1>
      <form th:action="@{/notifications/read-all}" method="post">
        <button type="submit" class="btn btn-ghost btn-sm">모두 읽음</button>
      </form>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container-sm">
    <div th:if="${notifications == null or notifications.isEmpty()}" class="empty">
      <div class="empty-icon">🔔</div>
      <div class="empty-title">알림이 없습니다.</div>
    </div>

    <div class="notif-list">
      <div th:each="notif : ${notifications}"
           class="notif-item"
           th:classappend="${!notif.read} ? ' unread' : ''">
        <div class="notif-dot" th:if="${!notif.read}"></div>
        <div class="notif-body">
          <a th:href="${notif.targetUrl != null ? notif.targetUrl : '#'}"
             th:text="${notif.message}" class="notif-msg"></a>
          <div class="notif-time" th:text="${#temporals.format(notif.createdAt,'yyyy.MM.dd HH:mm')}"></div>
        </div>
        <form th:action="@{'/notifications/' + ${notif.id} + '/delete'}" method="post" style="flex-shrink:0;">
          <button type="submit" class="btn btn-ghost btn-xs" style="color:var(--t5);">✕</button>
        </form>
      </div>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
