<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('알림', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <h1>알림</h1>
        <p>활동 알림을 확인하세요 · 진입 시 자동 읽음 처리됩니다</p>
      </div>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container-sm">
    <div th:if="${notifications == null or notifications.isEmpty()}" class="empty">
      <div class="empty-icon">🔔</div>
      <div class="empty-title">알림이 없습니다.</div>
    </div>

    <div class="card" style="padding:0;overflow:hidden;" th:unless="${notifications == null or notifications.isEmpty()}">
      <div class="notif-list">
        <div th:each="notif : ${notifications}"
             class="notif-item" th:classappend="${!notif.read} ? ' unread' : ''">
          <div class="notif-dot" th:if="${!notif.read}"></div>
          <div class="notif-icon" th:if="${notif.read}">🔔</div>
          <div class="notif-content">
            <div class="notif-msg" th:text="${notif.message}"></div>
            <div class="notif-time" th:text="${#temporals.format(notif.createdAt,'yyyy.MM.dd HH:mm')}"></div>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0;">
            <a th:if="${notif.link != null and !#strings.isEmpty(notif.link)}"
               th:href="${notif.link}" class="btn btn-ghost btn-xs">보기</a>
            <form th:action="@{/notifications/{id}/delete(id=${notif.id})}" method="post" style="display:inline;">
              <button type="submit" class="btn btn-ghost btn-xs" style="color:var(--t5);">삭제</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
