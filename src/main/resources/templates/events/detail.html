<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${event.title}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="section-sm">
  <div class="container">
    <div class="two-col">
      <div>
        <div class="card">
          <div class="post-header">
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
              <span class="pill pill-gray" th:text="${event.eventType}"></span>
              <span class="pill pill-gray" th:text="${event.location}"></span>
              <span class="pill"
                    th:classappend="${event.status == 'ONGOING'} ? ' pill-green' : (${event.status == 'UPCOMING'} ? ' pill-blue' : ' pill-gray')"
                    th:text="${event.status == 'ONGOING'} ? '진행 중' : (${event.status == 'UPCOMING'} ? '예정' : (${event.status == 'COMPLETED'} ? '종료' : '취소'))">
              </span>
            </div>
            <h1 class="post-title" th:text="${event.title}"></h1>
            <div class="post-attrs">
              <span class="post-attr">
                주최: <a th:href="@{/profile/{id}(id=${event.organizer.id})}"
                   style="font-weight:600;color:var(--blue);"
                   th:text="${event.organizer.nickname}"></a>
              </span>
              <span class="post-attr">🗓 시작: <span th:text="${#temporals.format(event.startDate,'yyyy.MM.dd HH:mm')}"></span></span>
              <span class="post-attr">🗓 종료: <span th:text="${#temporals.format(event.endDate,'yyyy.MM.dd HH:mm')}"></span></span>
              <span class="post-attr">👥 <span th:text="${event.currentParticipants}"></span>/<span th:text="${event.maxParticipants}"></span> 참가</span>
            </div>
          </div>

          <div class="post-body" th:text="${event.description}"></div>

          <div class="post-actions">
            <!-- Join button (UPCOMING / ONGOING) -->
            <form th:if="${session.loginMember != null
                          and (event.status == 'UPCOMING' or event.status == 'ONGOING')
                          and (event.maxParticipants == 0 or event.currentParticipants < event.maxParticipants)}"
                  th:action="@{/events/{id}/join(id=${event.id})}" method="post" style="display:inline;">
              <button type="submit" class="btn btn-blue btn-sm">🙋 참가하기</button>
            </form>
            <a th:if="${session.loginMember != null}"
               th:href="@{/report/form(targetType='EVENT',targetId=${event.id})}"
               class="btn btn-ghost btn-sm">신고</a>
            <th:block th:if="${session.loginMember != null and session.loginMember.id == event.organizer.id}">
              <a th:href="@{/events/{id}/edit(id=${event.id})}" class="btn btn-ghost btn-sm">수정</a>
              <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post" style="display:inline;"
                    onsubmit="return confirm('삭제하시겠습니까?')">
                <button type="submit" class="btn btn-danger btn-sm">삭제</button>
              </form>
            </th:block>
            <a th:href="@{/events}" class="btn btn-ghost btn-sm" style="margin-left:auto;">목록</a>
          </div>
        </div>
      </div>

      <aside>
        <div class="sidebar-block">
          <div class="sidebar-block-head">👤 주최자</div>
          <div class="sidebar-block-body">
            <div style="padding:16px 18px;display:flex;align-items:center;gap:12px;">
              <div class="av av-md" th:text="${#strings.substring(event.organizer.nickname,0,1)}">U</div>
              <div>
                <div style="font-size:.9rem;font-weight:600;color:var(--t1);" th:text="${event.organizer.nickname}"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="sidebar-block">
          <div class="sidebar-block-head">📋 이벤트 정보</div>
          <div class="sidebar-block-body" style="padding:16px 18px;">
            <div style="display:flex;flex-direction:column;gap:8px;font-size:.85rem;color:var(--t3);">
              <div>📍 <strong>장소:</strong> <span th:text="${event.location}"></span></div>
              <div>🗓 <strong>시작:</strong> <span th:text="${#temporals.format(event.startDate,'yyyy.MM.dd HH:mm')}"></span></div>
              <div>🗓 <strong>종료:</strong> <span th:text="${#temporals.format(event.endDate,'yyyy.MM.dd HH:mm')}"></span></div>
              <div>👥 <strong>참가:</strong> <span th:text="${event.currentParticipants}"></span> / <span th:text="${event.maxParticipants}"></span></div>
            </div>
          </div>
        </div>
        <div class="sidebar-block" th:if="${otherEvents != null and !otherEvents.isEmpty()}">
          <div class="sidebar-block-head">다른 이벤트</div>
          <div class="sidebar-block-body">
            <div th:each="e : ${otherEvents}" class="sidebar-row">
              <a th:href="@{/events/{id}(id=${e.id})}" th:text="${e.title}" class="sidebar-row-title"></a>
              <span class="sidebar-row-meta" th:text="${#temporals.format(e.startDate,'MM.dd')}"></span>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
