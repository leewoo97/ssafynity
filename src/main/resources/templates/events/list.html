<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('이벤트', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Community</div>
        <h1>이벤트</h1>
        <p>스터디, 해커톤, 세미나 소식을 공유하세요</p>
      </div>
      <a th:href="@{/events/new}" class="btn btn-blue btn-md">📅 이벤트 등록</a>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <!-- Status tabs -->
    <div class="tabs">
      <a th:href="@{/events}" class="tab" th:classappend="${status == null} ? ' active' : ''">전체</a>
      <a th:href="@{/events(status='UPCOMING')}" class="tab"
         th:classappend="${status == 'UPCOMING'} ? ' active' : ''">예정</a>
      <a th:href="@{/events(status='ONGOING')}" class="tab"
         th:classappend="${status == 'ONGOING'} ? ' active' : ''">진행중</a>
      <a th:href="@{/events(status='COMPLETED')}" class="tab"
         th:classappend="${status == 'COMPLETED'} ? ' active' : ''">종료</a>
    </div>

    <div th:if="${events == null or events.content.isEmpty()}" class="empty">
      <div class="empty-icon">📅</div>
      <div class="empty-title">등록된 이벤트가 없습니다.</div>
      <div class="empty-sub" style="margin-top:16px;">
        <a th:href="@{/events/new}" class="btn btn-blue btn-md">이벤트 등록하기</a>
      </div>
    </div>

    <div class="event-grid">
      <div th:each="event : ${events.content}" class="event-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:12px;">
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <span class="pill pill-gray" th:text="${event.category}"></span>
          </div>
          <span class="event-status"
                th:classappend="${event.status?.name() == 'UPCOMING'} ? ' status-upcoming' : (${event.status?.name() == 'ONGOING'} ? ' status-ongoing' : ' status-completed')"
                th:text="${event.status?.name() == 'UPCOMING'} ? '예정' : (${event.status?.name() == 'ONGOING'} ? '진행중' : '종료')">상태</span>
        </div>
        <div class="event-card-title">
          <a th:href="@{/events/{id}(id=${event.id})}" th:text="${event.title}"></a>
        </div>
        <div class="event-card-dates">
          <span>📅 <span th:text="${#temporals.format(event.startDate,'MM/dd')}"></span></span>
          <span>→</span>
          <span th:text="${#temporals.format(event.endDate,'MM/dd')}"></span>
        </div>
        <div th:if="${event.maxParticipants != null}" class="event-progress">
          <div class="event-progress-bar">
            <div class="event-progress-fill"
                 th:style="'width:' + ${event.currentParticipants * 100 / event.maxParticipants} + '%'"></div>
          </div>
          <div class="event-progress-label">
            <span><span th:text="${event.currentParticipants}"></span>/<span th:text="${event.maxParticipants}"></span>명</span>
            <span th:text="${event.maxParticipants - event.currentParticipants} + '자리 남음'"></span>
          </div>
        </div>
        <div class="event-card-meta">
          <span th:text="${event.author.nickname}"></span>
          <span>·</span>
          <span th:text="${#temporals.format(event.createdAt,'yyyy.MM.dd')}"></span>
        </div>
      </div>
    </div>

    <div class="pagination" th:if="${events != null and events.totalPages > 1}">
      <a th:if="${events.hasPreviousPage}" th:href="@{/events(page=${events.number-1},status=${status})}">‹</a>
      <th:block th:each="i : ${#numbers.sequence(0, events.totalPages - 1)}">
        <a th:href="@{/events(page=${i},status=${status})}"
           th:text="${i+1}" th:classappend="${i == events.number} ? ' active' : ''"></a>
      </th:block>
      <a th:if="${events.hasNextPage}" th:href="@{/events(page=${events.number+1},status=${status})}">›</a>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
