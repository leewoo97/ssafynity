<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${event != null and event.id != null} ? '이벤트 수정' : '이벤트 등록', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css">

<div class="page-header">
  <div class="container">
    <h1 th:text="${event != null and event.id != null} ? '이벤트 수정' : '이벤트 등록'"></h1>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <div class="card">
      <form id="event-form"
            th:action="${event != null and event.id != null} ? @{/events/{id}/edit(id=${event.id})} : @{/events}"
            method="post">
        <div class="form-group">
          <label class="form-label">제목</label>
          <input class="form-input" type="text" name="title"
                 th:value="${event?.title}" required placeholder="이벤트 제목을 입력하세요">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">이벤트 유형</label>
            <select name="eventType" class="form-select">
              <option value="">-- 선택 --</option>
              <option th:each="et : ${eventTypes}"
                      th:value="${et}" th:text="${et}"
                      th:selected="${event != null and event.eventType == et}"></option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">장소 형태</label>
            <select name="location" class="form-select">
              <option value="">-- 선택 --</option>
              <option th:each="loc : ${locations}"
                      th:value="${loc}" th:text="${loc}"
                      th:selected="${event != null and event.location == loc}"></option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">시작 일시</label>
            <input class="form-input" type="datetime-local" name="startDate"
                   th:value="${event != null and event.startDate != null} ? ${#temporals.format(event.startDate,'yyyy-MM-dd'T'HH:mm')} : ''"
                   required>
          </div>
          <div class="form-group">
            <label class="form-label">종료 일시</label>
            <input class="form-input" type="datetime-local" name="endDate"
                   th:value="${event != null and event.endDate != null} ? ${#temporals.format(event.endDate,'yyyy-MM-dd'T'HH:mm')} : ''"
                   required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">최대 참가 인원</label>
          <input class="form-input" type="number" name="maxParticipants" min="1"
                 th:value="${event?.maxParticipants}" placeholder="50">
        </div>
        <div class="form-group">
          <label class="form-label">설명</label>
          <div id="initial-content" style="display:none" th:utext="${event?.description}"></div>
          <div id="editor"></div>
          <input type="hidden" name="description" id="content-input">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
          <a th:href="${event != null and event.id != null} ? @{/events/{id}(id=${event.id})} : @{/events}"
             class="btn btn-ghost btn-md">취소</a>
          <button type="submit" class="btn btn-blue btn-md"
                  th:text="${event != null and event.id != null} ? '수정하기' : '등록하기'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
var quill = new Quill('#editor', {
  theme: 'snow',
  placeholder: '내용을 입력하세요...',
  modules: {
    toolbar: {
      container: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ 'color': [] }, { 'background': [] }],
        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
        [{ 'align': [] }],
        ['link', 'image'],
        ['blockquote', 'code-block'],
        ['clean']
      ],
      handlers: { image: imageHandler }
    }
  }
});

var ic = document.getElementById('initial-content');
if (ic && ic.innerHTML.trim()) {
  quill.root.innerHTML = ic.innerHTML;
}

function imageHandler() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.click();
  input.onchange = function () {
    var file = input.files[0];
    if (!file) return;
    var fd = new FormData();
    fd.append('file', file);
    fetch('/upload/image', { method: 'POST', body: fd })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var range = quill.getSelection(true);
        quill.insertEmbed(range.index, 'image', data.url);
      });
  };
}

document.getElementById('event-form').addEventListener('submit', function () {
  document.getElementById('content-input').value = quill.root.innerHTML;
});
</script>

</th:block>
</body>
</html>
