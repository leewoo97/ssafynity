<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${event != null} ? '이벤트 수정' : '이벤트 등록', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <h1 th:text="${event != null} ? '이벤트 수정' : '이벤트 등록'"></h1>
  </div>
</div>

<div class="section-sm">
  <div class="container-sm">
    <div class="card">
      <form th:action="${event != null} ? @{'/events/' + ${event.id} + '/edit'} : @{/events}" method="post">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">카테고리</label>
            <select name="category" class="form-select">
              <option th:each="cat : ${categories}"
                      th:value="${cat}" th:text="${cat}"
                      th:selected="${event != null and event.category == cat}"></option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">최대 인원</label>
            <input class="form-input" type="number" name="maxParticipants"
                   th:value="${event?.maxParticipants}" placeholder="0 = 무제한" min="0">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">제목</label>
          <input class="form-input" type="text" name="title"
                 th:value="${event?.title}" required placeholder="이벤트 제목을 입력하세요">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">시작일</label>
            <input class="form-input" type="date" name="startDate"
                   th:value="${event != null ? #temporals.format(event.startDate,'yyyy-MM-dd') : ''}" required>
          </div>
          <div class="form-group">
            <label class="form-label">종료일</label>
            <input class="form-input" type="date" name="endDate"
                   th:value="${event != null ? #temporals.format(event.endDate,'yyyy-MM-dd') : ''}" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">장소</label>
          <input class="form-input" type="text" name="location"
                 th:value="${event?.location}" placeholder="온라인 / 서울 강남 등">
        </div>
        <div class="form-group">
          <label class="form-label">내용</label>
          <textarea class="form-textarea" name="content" rows="10" required
                    placeholder="이벤트 내용을 입력하세요"
                    th:text="${event?.content}"></textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <a th:href="${event != null} ? @{'/events/' + ${event.id}} : @{/events}" class="btn btn-ghost btn-md">취소</a>
          <button type="submit" class="btn btn-blue btn-md"
                  th:text="${event != null} ? '수정하기' : '등록하기'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
