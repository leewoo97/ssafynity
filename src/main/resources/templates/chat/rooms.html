<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('채팅', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Real-time</div>
        <h1>채팅방</h1>
        <p>실시간으로 소통하세요</p>
      </div>
      <button class="btn btn-blue btn-md" onclick="document.getElementById('create-modal').style.display='flex'">💬 방 만들기</button>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container-sm">
    <div th:if="${rooms == null or rooms.isEmpty()}" class="empty">
      <div class="empty-icon">💬</div>
      <div class="empty-title">채팅방이 없습니다.</div>
      <div class="empty-sub" style="margin-top:16px;">
        <button class="btn btn-blue btn-md" onclick="document.getElementById('create-modal').style.display='flex'">첫 채팅방 만들기</button>
      </div>
    </div>

    <div class="room-list">
      <a th:each="room : ${rooms}" th:href="@{/chat/room/{id}(id=${room.id})}" class="room-item">
        <div class="room-icon">💬</div>
        <div class="room-item-body">
          <div class="room-item-name" th:text="${room.name}"></div>
          <div class="room-item-meta">
            <span th:text="${room.memberCount ?: 0} + '명 참여중'"></span>
            <span th:if="${room.lastMessage != null}">·</span>
            <span th:if="${room.lastMessage != null}" th:text="${room.lastMessage}"></span>
          </div>
        </div>
        <div style="color:var(--t5);font-size:.78rem;" th:text="${#temporals.format(room.createdAt,'MM.dd')}"></div>
      </a>
    </div>
  </div>
</div>

<!-- Create modal -->
<div id="create-modal" class="modal-backdrop" style="display:none;">
  <div class="modal" style="max-width:400px;">
    <div class="modal-head">
      <div class="modal-title">새 채팅방</div>
      <button class="modal-close" onclick="document.getElementById('create-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <form th:action="@{/chat/rooms}" method="post">
        <div class="form-group">
          <label class="form-label">방 이름</label>
          <input class="form-input" type="text" name="name" required placeholder="채팅방 이름">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button type="button" class="btn btn-ghost btn-sm"
                  onclick="document.getElementById('create-modal').style.display='none'">취소</button>
          <button type="submit" class="btn btn-blue btn-sm">만들기</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
  document.getElementById('create-modal').addEventListener('click', function(e) {
    if (e.target === this) this.style.display = 'none';
  });
</script>

</th:block>
</body>
</html>
