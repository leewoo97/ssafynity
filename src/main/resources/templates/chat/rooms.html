<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('채팅')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container" style="padding-top:1.5rem;">

  <!-- 헤더 -->
  <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1.5rem;">
    <div>
      <h2 style="font-size:1.5rem; font-weight:800;">💬 실시간 채팅</h2>
      <p style="color:var(--muted); font-size:.88rem; margin-top:.2rem;">
        채팅방에 입장하여 다른 멤버들과 실시간으로 대화하세요.
      </p>
    </div>
    <!-- 채팅방 생성 버튼 (로그인 시에만) -->
    <button th:if="${loginMember != null}"
            class="btn btn-primary"
            onclick="document.getElementById('createModal').style.display='flex'">
      + 채팅방 만들기
    </button>
  </div>

  <!-- 플래시 메시지 -->
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

  <!-- 채팅방 목록 -->
  <div th:if="${rooms.isEmpty()}" class="card" style="text-align:center; padding:3rem;">
    <p style="font-size:3rem;">💬</p>
    <h3>아직 채팅방이 없습니다</h3>
    <p style="color:var(--muted); margin-top:.5rem;">첫 채팅방을 만들어보세요!</p>
  </div>

  <div class="chat-room-grid" th:if="${!rooms.isEmpty()}">
    <a class="chat-room-card" th:each="room : ${rooms}"
       th:href="@{'/chat/' + ${room.id}}">
      <!-- 방 아이콘 (랜덤 색상 느낌) -->
      <div class="chat-room-icon">
        <span th:text="${#strings.substring(room.name, 0, 1)}">C</span>
      </div>
      <div class="chat-room-info">
        <div class="chat-room-name" th:text="${room.name}">채팅방 이름</div>
        <div class="chat-room-desc" th:if="${room.description != null and !room.description.isEmpty()}"
             th:text="${room.description}">설명</div>
        <div class="chat-room-meta">
          <span>👤 <span th:text="${room.creator != null ? room.creator.nickname : '알 수 없음'}"></span></span>
          <span th:if="${room.activeUsers > 0}" style="color:var(--success);">
            🟢 <span th:text="${room.activeUsers}"></span>명 참여 중
          </span>
          <span th:if="${room.activeUsers == 0}" style="color:var(--muted);">비어있음</span>
        </div>
      </div>
      <div class="chat-room-arrow">›</div>
    </a>
  </div>

</div>

<!-- 채팅방 생성 모달 -->
<div id="createModal"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
            z-index:999; align-items:center; justify-content:center;">
  <div class="card" style="width:100%; max-width:440px; margin:1rem;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem;">
      <h3 style="margin:0;">💬 채팅방 만들기</h3>
      <button class="btn btn-ghost btn-sm"
              onclick="document.getElementById('createModal').style.display='none'">✕</button>
    </div>
    <form th:action="@{/chat}" method="post">
      <div class="form-group">
        <label>채팅방 이름 *</label>
        <input type="text" name="name" maxlength="50" placeholder="예: SSAFY 14기 자유잡담" required>
      </div>
      <div class="form-group">
        <label>설명 (선택)</label>
        <textarea name="description" rows="3" placeholder="채팅방 소개를 간단히 적어주세요."></textarea>
      </div>
      <div style="display:flex; gap:.6rem; justify-content:flex-end; margin-top:.5rem;">
        <button type="button" class="btn btn-ghost"
                onclick="document.getElementById('createModal').style.display='none'">취소</button>
        <button type="submit" class="btn btn-primary">만들기</button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

<style>
/* ── Chat Room List ── */
.chat-room-grid {
  display: flex;
  flex-direction: column;
  gap: .6rem;
}
.chat-room-card {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 1rem 1.2rem;
  text-decoration: none;
  color: inherit;
  transition: transform .12s, box-shadow .12s;
  border: 1.5px solid transparent;
}
.chat-room-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(79,110,247,.14);
  border-color: var(--primary);
  text-decoration: none;
  color: inherit;
}
.chat-room-icon {
  width: 50px; height: 50px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), #9b5cf6);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 1.4rem;
  font-weight: 800;
  flex-shrink: 0;
}
.chat-room-info { flex: 1; min-width: 0; }
.chat-room-name {
  font-weight: 700;
  font-size: 1rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-room-desc {
  font-size: .83rem;
  color: var(--muted);
  margin-top: .15rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-room-meta {
  display: flex;
  gap: .8rem;
  align-items: center;
  font-size: .78rem;
  color: var(--muted);
  margin-top: .3rem;
}
.chat-room-arrow {
  font-size: 1.5rem;
  color: var(--muted);
  flex-shrink: 0;
}
</style>

</body>
</html>
