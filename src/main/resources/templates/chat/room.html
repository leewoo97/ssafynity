<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${room.name}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="section-sm">
  <div class="container-sm">
    <div class="card" style="padding:0;overflow:hidden;">
      <!-- Chat header -->
      <div class="chat-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <a th:href="@{/chat}" class="btn btn-ghost btn-sm" style="padding:4px 8px;">‹</a>
          <div>
            <div style="font-size:.95rem;font-weight:600;color:var(--t1);" th:text="${room.name}"></div>
            <div style="font-size:.75rem;color:var(--t5);">
              <span class="status-dot"></span>
              <span th:text="${room.activeUsers}"></span>명 접속 중
            </div>
          </div>
        </div>
      </div>

      <!-- Message history -->
      <div class="chat-messages" id="chatMessages">
        <div th:each="msg : ${history}"
             class="chat-msg"
             th:classappend="${loginMember != null and msg.senderId == loginMember.id} ? ' mine' : ' theirs'">
          <div class="chat-msg-inner">
            <div class="chat-msg-name"
                 th:unless="${loginMember != null and msg.senderId == loginMember.id}"
                 th:text="${msg.senderNickname}"></div>
            <div class="chat-bubble" th:text="${msg.content}"></div>
            <div class="chat-msg-time" th:text="${msg.timestamp}"></div>
          </div>
        </div>
      </div>

      <!-- Input bar -->
      <div class="chat-input-bar" th:if="${session.loginMember != null}">
        <input type="text" id="msgInput" class="form-input"
               placeholder="메시지를 입력하세요..." autocomplete="off"
               style="flex:1;" onkeydown="if(event.key==='Enter'){sendMsg();}">
        <button class="btn btn-blue btn-sm" onclick="sendMsg()">전송</button>
      </div>
      <div th:unless="${session.loginMember != null}"
           style="padding:14px;text-align:center;font-size:.85rem;color:var(--t4);border-top:1px solid var(--border);">
        <a th:href="@{/member/login}" style="color:var(--blue);">로그인</a>하면 채팅에 참여할 수 있습니다
      </div>
    </div>
  </div>
</div>

<!-- WebSocket script -->
<script th:if="${session.loginMember != null}"
        th:inline="javascript">
  const roomId = [[${room.id}]];
  const senderNickname = [[${session.loginMember.nickname}]];
  const senderId = [[${session.loginMember.id}]];

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/chat/${roomId}`);

  ws.onmessage = function(e) {
    const data = JSON.parse(e.data);
    if (data.type === 'CHAT') appendMsg(data, data.senderId === senderId);
  };

  function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || ws.readyState !== WebSocket.OPEN) return;
    const payload = {
      type: 'CHAT',
      roomId: roomId,
      senderId: senderId,
      senderNickname: senderNickname,
      content: text
    };
    ws.send(JSON.stringify(payload));
    input.value = '';
  }

  function appendMsg(data, isMine) {
    const box = document.getElementById('chatMessages');
    const wrap = document.createElement('div');
    wrap.className = 'chat-msg ' + (isMine ? 'mine' : 'theirs');
    wrap.innerHTML = `
      <div class="chat-msg-inner">
        ${!isMine ? `<div class="chat-msg-name">${data.senderNickname}</div>` : ''}
        <div class="chat-bubble">${data.content}</div>
        <div class="chat-msg-time">${data.timestamp || ''}</div>
      </div>`;
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
  }

  window.addEventListener('load', () => {
    const box = document.getElementById('chatMessages');
    box.scrollTop = box.scrollHeight;
  });
</script>

</th:block>
</body>
</html>
