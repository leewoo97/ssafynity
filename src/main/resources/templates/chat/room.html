<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${room.name}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="section-sm">
  <div class="container-sm">
    <div class="card" style="padding:0;overflow:hidden;height:calc(100vh - 200px);min-height:500px;display:flex;flex-direction:column;">
      <!-- Header -->
      <div style="padding:16px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;">
        <a th:href="@{/chat/rooms}" class="btn btn-ghost btn-sm" style="padding:4px 8px;">← 목록</a>
        <div style="font-weight:600;font-size:1rem;color:var(--t1);" th:text="${room.name}"></div>
        <div style="margin-left:auto;font-size:.8rem;color:var(--t4);">
          <span id="member-count">접속중</span>
        </div>
      </div>

      <!-- Messages -->
      <div id="message-list" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;">
        <div th:each="msg : ${messages}"
             th:classappend="${msg.sender.id == session.loginMember?.id} ? ' self' : ''"
             class="chat-msg">
          <div th:unless="${msg.sender.id == session.loginMember?.id}" class="av av-sm"
               th:text="${msg.sender.name != null ? #strings.substring(msg.sender.name,0,1) : 'U'}">U</div>
          <div>
            <div th:unless="${msg.sender.id == session.loginMember?.id}"
                 style="font-size:.75rem;color:var(--t4);margin-bottom:3px;"
                 th:text="${msg.sender.nickname}"></div>
            <div class="chat-bubble" th:text="${msg.content}"></div>
            <div style="font-size:.7rem;color:var(--t5);margin-top:3px;"
                 th:text="${#temporals.format(msg.createdAt,'HH:mm')}"></div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div style="padding:12px 16px;border-top:1px solid var(--b1);display:flex;gap:8px;">
        <input id="msg-input" class="form-input" type="text" placeholder="메시지를 입력하세요..."
               style="flex:1;" autocomplete="off">
        <button id="send-btn" class="btn btn-blue btn-sm">전송</button>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  const roomId = /*[[${room.id}]]*/ '';
  const myId = /*[[${session.loginMember?.id}]]*/ null;
  const myNick = /*[[${session.loginMember?.nickname}]]*/ '';

  const msgList = document.getElementById('message-list');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');

  // Scroll to bottom
  msgList.scrollTop = msgList.scrollHeight;

  // WebSocket
  const ws = new WebSocket('ws://' + location.host + '/ws/chat/' + roomId);

  ws.onmessage = function(e) {
    const data = JSON.parse(e.data);
    const isSelf = data.senderId == myId;
    const div = document.createElement('div');
    div.className = 'chat-msg' + (isSelf ? ' self' : '');
    div.innerHTML = (isSelf ? '' : '<div class="av av-sm">' + (data.senderName || 'U').charAt(0) + '</div>') +
      '<div>' + (!isSelf ? '<div style="font-size:.75rem;color:var(--t4);margin-bottom:3px;">' + data.senderNick + '</div>' : '') +
      '<div class="chat-bubble">' + data.content + '</div>' +
      '<div style="font-size:.7rem;color:var(--t5);margin-top:3px;">' + new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'}) + '</div>' +
      '</div>';
    msgList.appendChild(div);
    msgList.scrollTop = msgList.scrollHeight;
  };

  function sendMessage() {
    const content = msgInput.value.trim();
    if (!content || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ content }));
    msgInput.value = '';
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>

</th:block>
</body>
</html>
