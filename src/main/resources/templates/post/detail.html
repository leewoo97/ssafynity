<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${post.title}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="section-sm">
  <div class="container">
    <div class="two-col">
      <div>
        <div class="card">
          <!-- Post Header -->
          <div class="post-header">
            <div style="margin-bottom:10px;">
              <span class="pill pill-gray" th:text="${post.category}"></span>
            </div>
            <h1 class="post-title" th:text="${post.title}"></h1>
            <div class="post-attrs">
              <span class="post-attr">
                <a th:href="@{'/member/profile/' + ${post.author.id}}"
                   style="font-weight:600;color:var(--blue);"
                   th:text="${post.author.nickname}"></a>
              </span>
              <span class="post-attr">🕐 <span th:text="${#temporals.format(post.createdAt,'yyyy.MM.dd HH:mm')}"></span></span>
              <span class="post-attr">👁 <span th:text="${post.viewCount}"></span></span>
              <span class="post-attr">❤ <span th:text="${post.likeCount}"></span></span>
            </div>
          </div>

          <!-- Body -->
          <div class="post-body" th:text="${post.content}"></div>

          <!-- Actions -->
          <div class="post-actions">
            <form th:action="@{'/posts/' + ${post.id} + '/like'}" method="post" style="display:inline;">
              <button type="submit" class="like-btn" th:classappend="${liked} ? ' liked' : ''">
                ❤ 추천 <span th:text="${post.likeCount}"></span>
              </button>
            </form>
            <th:block th:if="${session.loginMember != null and session.loginMember.id == post.author.id}">
              <a th:href="@{'/posts/' + ${post.id} + '/edit'}" class="btn btn-ghost btn-sm">수정</a>
              <form th:action="@{'/posts/' + ${post.id} + '/delete'}" method="post" style="display:inline;"
                    onsubmit="return confirm('삭제하시겠습니까?')">
                <button type="submit" class="btn btn-danger btn-sm">삭제</button>
              </form>
            </th:block>
            <a th:href="@{/posts}" class="btn btn-ghost btn-sm" style="margin-left:auto;">목록</a>
          </div>
        </div>

        <!-- Comments -->
        <div class="card" style="margin-top:16px;">
          <div class="section-head">
            <h3>댓글 <span style="color:var(--blue);" th:text="${#lists.size(comments)}"></span></h3>
          </div>

          <!-- Compose -->
          <div class="comment-compose" th:if="${session.loginMember != null}">
            <div class="av av-sm"
                 th:text="${session.loginMember.name != null ? #strings.substring(session.loginMember.name,0,1) : 'U'}">U</div>
            <div class="comment-compose-box">
              <form th:action="@{'/posts/' + ${post.id} + '/comments'}" method="post">
                <textarea class="comment-textarea" name="content" placeholder="댓글을 입력하세요..." rows="3"></textarea>
                <div style="display:flex;justify-content:flex-end;margin-top:6px;">
                  <button type="submit" class="btn btn-blue btn-sm">댓글 등록</button>
                </div>
              </form>
            </div>
          </div>

          <!-- Comment List -->
          <div class="comment-list">
            <div th:if="${comments == null or comments.isEmpty()}" class="empty" style="padding:32px 0;">
              <div class="empty-icon">💬</div>
              <div class="empty-title">첫 댓글을 남겨보세요.</div>
            </div>
            <div th:each="c : ${comments}" class="comment-item">
              <div class="av av-sm"
                   th:text="${c.author.name != null ? #strings.substring(c.author.name,0,1) : 'U'}">U</div>
              <div class="comment-body">
                <div class="comment-header">
                  <span class="comment-author" th:text="${c.author.nickname}"></span>
                  <span class="comment-date" th:text="${#temporals.format(c.createdAt,'MM.dd HH:mm')}"></span>
                </div>
                <div class="comment-text" th:text="${c.content}"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <aside>
        <div class="sidebar-block">
          <div class="sidebar-block-head">관련 게시글</div>
          <div class="sidebar-block-body">
            <div th:each="p : ${relatedPosts}" class="sidebar-row">
              <div style="flex:1;min-width:0;">
                <a th:href="@{/posts/{id}(id=${p.id})}" th:text="${p.title}" class="sidebar-row-title"></a>
                <div class="sidebar-row-meta" th:text="${#temporals.format(p.createdAt,'MM.dd')}"></div>
              </div>
            </div>
            <div th:if="${relatedPosts == null or relatedPosts.isEmpty()}" style="padding:14px 18px;font-size:.82rem;color:var(--t4);">관련 게시글이 없습니다.</div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
