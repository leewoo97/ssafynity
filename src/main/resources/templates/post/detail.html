<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${post.title}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="section-sm">
  <div class="container">
    <div class="two-col">
      <div>
        <div class="card">
          <div class="post-header">
            <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
              <span class="pill pill-gray" th:text="${post.category}"></span>
            </div>
            <h1 class="post-title" th:text="${post.title}"></h1>
            <div class="post-attrs">
              <span class="post-attr">
                <a th:href="@{/profile/{id}(id=${post.author.id})}"
                   style="font-weight:600;color:var(--blue);"
                   th:text="${post.author.nickname}"></a>
              </span>
              <span class="post-attr">🕐 <span th:text="${#temporals.format(post.createdAt,'yyyy.MM.dd HH:mm')}"></span></span>
              <span class="post-attr">👁 <span th:text="${post.viewCount}"></span></span>
              <span class="post-attr">❤ <span th:text="${post.likeCount}"></span></span>
            </div>
          </div>

          <div class="post-body" th:text="${post.content}"></div>

          <div class="post-actions">
            <!-- Like button -->
            <form th:if="${session.loginMember != null}"
                  th:action="@{/posts/{id}/like(id=${post.id})}" method="post" style="display:inline;">
              <button type="submit" class="like-btn" th:classappend="${liked} ? ' liked' : ''">
                <span>❤</span>
                <span th:text="${liked} ? '좋아요 취소' : '좋아요'"></span>
                <span th:text="${post.likeCount}"></span>
              </button>
            </form>
            <!-- Report -->
            <a th:if="${session.loginMember != null}"
               th:href="@{/report/form(targetType='POST',targetId=${post.id})}"
               class="btn btn-ghost btn-sm">신고</a>
            <!-- Edit/Delete (owner) -->
            <th:block th:if="${session.loginMember != null and session.loginMember.id == post.author.id}">
              <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-ghost btn-sm">수정</a>
              <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline;"
                    onsubmit="return confirm('삭제하시겠습니까?')">
                <button type="submit" class="btn btn-danger btn-sm">삭제</button>
              </form>
            </th:block>
            <a th:href="@{/posts}" class="btn btn-ghost btn-sm" style="margin-left:auto;">목록</a>
          </div>
        </div>

        <!-- Comments -->
        <div class="card" style="margin-top:16px;">
          <div style="font-size:.95rem;font-weight:600;color:var(--t2);margin-bottom:16px;">
            댓글 <span th:text="${comments != null ? comments.size() : 0}"></span>
          </div>

          <!-- Comment form -->
          <div th:if="${session.loginMember != null}" class="comment-compose">
            <div class="av av-sm" th:text="${#strings.substring(session.loginMember.nickname,0,1)}">U</div>
            <form th:action="@{/comments(postId=${post.id})}" method="post" style="flex:1;display:flex;gap:8px;">
              <input type="hidden" name="postId" th:value="${post.id}">
              <input class="form-input" type="text" name="content" required
                     placeholder="댓글을 입력하세요..." style="flex:1;">
              <button type="submit" class="btn btn-blue btn-sm">등록</button>
            </form>
          </div>
          <div th:unless="${session.loginMember != null}"
               style="padding:14px;background:var(--surface-2);border-radius:var(--r-sm);text-align:center;font-size:.88rem;color:var(--t4);">
            댓글을 달려면 <a th:href="@{/member/login}" style="color:var(--blue);">로그인</a>하세요
          </div>

          <!-- Comment list -->
          <div class="comment-list" th:if="${comments != null and !comments.isEmpty()}">
            <div th:each="comment : ${comments}" class="comment-item">
              <div class="av av-sm" th:text="${#strings.substring(comment.author.nickname,0,1)}">U</div>
              <div class="comment-body">
                <div class="comment-header">
                  <a th:href="@{/profile/{id}(id=${comment.author.id})}"
                     style="font-weight:600;font-size:.88rem;color:var(--t1);"
                     th:text="${comment.author.nickname}"></a>
                  <span style="font-size:.78rem;color:var(--t5);"
                        th:text="${#temporals.format(comment.createdAt,'MM.dd HH:mm')}"></span>
                </div>
                <div class="comment-text" th:text="${comment.content}"></div>
                <th:block th:if="${session.loginMember != null and session.loginMember.id == comment.author.id}">
                  <form th:action="@{/comments/{id}/delete(id=${comment.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="postId" th:value="${post.id}">
                    <button type="submit" class="btn btn-ghost btn-xs" style="color:var(--t5);">삭제</button>
                  </form>
                </th:block>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <aside>
        <div class="sidebar-block">
          <div class="sidebar-block-head">✍️ 작성자</div>
          <div class="sidebar-block-body">
            <div style="padding:16px 18px;display:flex;align-items:center;gap:12px;">
              <div class="av av-md" th:text="${#strings.substring(post.author.nickname,0,1)}">U</div>
              <div>
                <div style="font-size:.9rem;font-weight:600;color:var(--t1);" th:text="${post.author.nickname}"></div>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
