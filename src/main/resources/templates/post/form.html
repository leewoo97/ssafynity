<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${post != null} ? '게시글 수정' : '글쓰기', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css">

<div class="page-header">
  <div class="container">
    <h1 th:text="${post != null} ? '게시글 수정' : '새 게시글'"></h1>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <div class="card">
      <form id="post-form"
            th:action="${post != null} ? @{/posts/{id}/edit(id=${post.id})} : @{/posts}"
            method="post">
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select name="category" class="form-select">
            <option th:each="cat : ${categories}"
                    th:value="${cat}" th:text="${cat}"
                    th:selected="${post != null and post.category == cat}"></option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">제목</label>
          <input class="form-input" type="text" name="title"
                 th:value="${post?.title}" required placeholder="제목을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">내용</label>
          <div id="initial-content" style="display:none" th:utext="${post?.content}"></div>
          <div id="editor"></div>
          <input type="hidden" name="content" id="content-input">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
          <a th:href="${post != null} ? @{/posts/{id}(id=${post.id})} : @{/posts}"
             class="btn btn-ghost btn-md">취소</a>
          <button type="submit" class="btn btn-blue btn-md"
                  th:text="${post != null} ? '수정하기' : '등록하기'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
var quill = new Quill('#editor', {
  theme: 'snow',
  placeholder: '내용을 입력하세요...',
  modules: {
    toolbar: {
      container: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ 'color': [] }, { 'background': [] }],
        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
        [{ 'align': [] }],
        ['link', 'image'],
        ['blockquote', 'code-block'],
        ['clean']
      ],
      handlers: { image: imageHandler }
    }
  }
});

var ic = document.getElementById('initial-content');
if (ic && ic.innerHTML.trim()) {
  quill.root.innerHTML = ic.innerHTML;
}

function imageHandler() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.click();
  input.onchange = function () {
    var file = input.files[0];
    if (!file) return;
    var fd = new FormData();
    fd.append('file', file);
    fetch('/upload/image', { method: 'POST', body: fd })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var range = quill.getSelection(true);
        quill.insertEmbed(range.index, 'image', data.url);
      });
  };
}

document.getElementById('post-form').addEventListener('submit', function () {
  document.getElementById('content-input').value = quill.root.innerHTML;
});
</script>

</th:block>
</body>
</html>
