<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${post != null} ? '게시글 수정' : '게시글 작성')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container" style="max-width:700px;">
  <div class="card">
    <h2 th:text="${post != null} ? '✏ 게시글 수정' : '✏ 글쓰기'"></h2>
    <form th:action="${post != null} ? @{'/posts/' + ${post.id} + '/edit'} : @{/posts}" method="post">
      <div class="form-group">
        <label>카테고리</label>
        <select name="category">
          <option th:each="cat : ${categories}"
                  th:value="${cat}"
                  th:text="${cat}"
                  th:selected="${post != null and post.category == cat}"></option>
        </select>
      </div>
      <div class="form-group">
        <label>제목</label>
        <input type="text" name="title" th:value="${post?.title}" required placeholder="제목을 입력하세요">
      </div>
      <div class="form-group">
        <label>내용</label>
        <textarea name="content" required rows="12" placeholder="내용을 입력하세요..." th:text="${post?.content}"></textarea>
      </div>
      <div style="display:flex; gap:.7rem;">
        <button type="submit" class="btn btn-primary" th:text="${post != null} ? '수정하기' : '작성하기'"></button>
        <a th:href="${post != null} ? @{'/posts/' + ${post.id}} : @{/posts}" class="btn btn-ghost">취소</a>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
