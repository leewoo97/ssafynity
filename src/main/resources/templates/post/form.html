<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${post != null} ? '게시글 수정' : '글쓰기', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <h1 th:text="${post != null} ? '게시글 수정' : '새 게시글 작성'"></h1>
  </div>
</div>

<div class="section-sm">
  <div class="container-sm">
    <div class="card">
      <form th:action="${post != null} ? @{'/posts/' + ${post.id} + '/edit'} : @{/posts}" method="post">
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select name="category" class="form-select">
            <option th:each="cat : ${categories}"
                    th:value="${cat}" th:text="${cat}"
                    th:selected="${post != null and post.category == cat}"></option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">제목</label>
          <input class="form-input" type="text" name="title"
                 th:value="${post?.title}" required placeholder="제목을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">내용</label>
          <textarea class="form-textarea" name="content" required
                    rows="14" placeholder="내용을 입력하세요..."
                    th:text="${post?.content}"></textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <a th:href="${post != null} ? @{'/posts/' + ${post.id}} : @{/posts}" class="btn btn-ghost btn-md">취소</a>
          <button type="submit" class="btn btn-blue btn-md"
                  th:text="${post != null} ? '수정하기' : '작성하기'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
