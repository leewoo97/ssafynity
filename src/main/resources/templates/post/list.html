<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('게시판', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Community</div>
        <h1>게시판</h1>
        <p>SSAFY인들의 이야기를 나눠보세요</p>
      </div>
      <a th:href="@{/posts/new}" class="btn btn-blue btn-md">✏️ 글쓰기</a>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <div class="two-col">
      <div>
        <!-- Category tabs -->
        <div class="tabs">
          <a th:href="@{/posts(keyword=${keyword})}" class="tab"
             th:classappend="${category == null or category == ''} ? ' active' : ''">전체</a>
          <a th:each="cat : ${categories}"
             th:href="@{/posts(category=${cat},keyword=${keyword})}"
             th:text="${cat}" class="tab"
             th:classappend="${cat == category} ? ' active' : ''"></a>
        </div>

        <!-- Search + sort -->
        <form th:action="@{/posts}" method="get" class="search-row" style="margin-bottom:16px;">
          <input type="hidden" name="category" th:value="${category}">
          <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어 입력..." class="search-input">
          <select name="sort" class="search-select">
            <option value="createdAt" th:selected="${sort == 'createdAt' or sort == null}">최신순</option>
            <option value="viewCount" th:selected="${sort == 'viewCount'}">조회순</option>
            <option value="likeCount" th:selected="${sort == 'likeCount'}">인기순</option>
          </select>
          <button type="submit" class="btn btn-blue btn-md">검색</button>
        </form>

        <div th:if="${posts == null or posts.isEmpty()}" class="empty">
          <div class="empty-icon">📝</div>
          <div class="empty-title">게시글이 없습니다.</div>
        </div>

        <div class="card card-flush" th:unless="${posts == null or posts.isEmpty()}">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr><th>제목</th><th>카테고리</th><th>작성자</th><th>조회</th><th>좋아요</th><th>날짜</th></tr>
              </thead>
              <tbody>
                <tr th:each="post : ${posts}">
                  <td>
                    <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}" class="table-link"></a>
                  </td>
                  <td><span class="pill pill-gray" th:text="${post.category}"></span></td>
                  <td th:text="${post.author.nickname}"></td>
                  <td th:text="${post.viewCount}"></td>
                  <td th:text="${post.likeCount}"></td>
                  <td style="color:var(--t5);font-size:.8rem;"
                      th:text="${#temporals.format(post.createdAt,'MM.dd')}"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination (page=int, totalPages=int) -->
        <div class="pagination" th:if="${totalPages != null and totalPages > 1}">
          <a th:if="${page > 0}"
             th:href="@{/posts(page=${page-1},category=${category},keyword=${keyword},sort=${sort})}">‹</a>
          <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/posts(page=${i},category=${category},keyword=${keyword},sort=${sort})}"
               th:text="${i+1}" th:classappend="${i == page} ? ' active' : ''"></a>
          </th:block>
          <a th:if="${page < totalPages - 1}"
             th:href="@{/posts(page=${page+1},category=${category},keyword=${keyword},sort=${sort})}">›</a>
        </div>
      </div>

      <!-- Sidebar -->
      <aside>
        <div class="sidebar-block">
          <div class="sidebar-block-head">🔥 인기 게시글</div>
          <div class="sidebar-block-body">
            <div th:if="${topLiked == null or topLiked.isEmpty()}"
                 style="padding:14px 18px;color:var(--t5);font-size:.85rem;">없음</div>
            <div th:each="p : ${topLiked}" class="sidebar-row">
              <a th:href="@{/posts/{id}(id=${p.id})}" th:text="${p.title}" class="sidebar-row-title"></a>
              <span class="sidebar-row-meta" th:text="'❤ ' + ${p.likeCount}"></span>
            </div>
          </div>
        </div>
        <div class="sidebar-block">
          <div class="sidebar-block-head">👁 많이 본 글</div>
          <div class="sidebar-block-body">
            <div th:if="${topViewed == null or topViewed.isEmpty()}"
                 style="padding:14px 18px;color:var(--t5);font-size:.85rem;">없음</div>
            <div th:each="p : ${topViewed}" class="sidebar-row">
              <a th:href="@{/posts/{id}(id=${p.id})}" th:text="${p.title}" class="sidebar-row-title"></a>
              <span class="sidebar-row-meta" th:text="'👁 ' + ${p.viewCount}"></span>
            </div>
          </div>
        </div>
        <a th:href="@{/posts/new}" class="btn btn-blue btn-md" style="width:100%;text-align:center;">✏️ 글쓰기</a>
      </aside>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
