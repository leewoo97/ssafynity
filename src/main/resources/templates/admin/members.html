<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('회원 관리', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Admin</div>
        <h1>회원 관리</h1>
        <p th:text="${members != null ? members.size() + '명' : '0명'}">0명</p>
      </div>
      <a th:href="@{/admin}" class="btn btn-ghost btn-md">← 대시보드</a>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <div th:if="${members == null or members.isEmpty()}" class="empty">
      <div class="empty-icon">👥</div>
      <div class="empty-title">등록된 회원이 없습니다.</div>
    </div>

    <div class="card card-flush" th:unless="${members == null or members.isEmpty()}">
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>아이디</th>
              <th>닉네임</th>
              <th>이메일</th>
              <th>역할</th>
              <th>가입일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="m : ${members}">
              <td style="color:var(--t5);font-size:.8rem;" th:text="${m.id}"></td>
              <td th:text="${m.username}"></td>
              <td>
                <a th:href="@{/profile/{id}(id=${m.id})}"
                   style="font-weight:600;color:var(--blue);"
                   th:text="${m.nickname}"></a>
              </td>
              <td style="font-size:.85rem;color:var(--t3);" th:text="${m.email}"></td>
              <td>
                <span class="pill"
                      th:classappend="${m.role == 'ADMIN'} ? ' pill-orange' : ' pill-gray'"
                      th:text="${m.role}"></span>
              </td>
              <td style="font-size:.78rem;color:var(--t5);"
                  th:text="${#temporals.format(m.createdAt,'yyyy.MM.dd')}"></td>
              <td>
                <form th:action="@{/admin/members/{id}/delete(id=${m.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('정말 삭제하시겠습니까?')">
                  <button type="submit" class="btn btn-danger btn-xs">삭제</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
