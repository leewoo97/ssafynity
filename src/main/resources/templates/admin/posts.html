<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('게시글 관리', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Admin</div>
        <h1>게시글 관리</h1>
        <p th:text="${posts != null ? posts.size() + '개' : '0개'}">0개</p>
      </div>
      <a th:href="@{/admin}" class="btn btn-ghost btn-md">← 대시보드</a>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <div th:if="${posts == null or posts.isEmpty()}" class="empty">
      <div class="empty-icon">📝</div>
      <div class="empty-title">게시글이 없습니다.</div>
    </div>

    <div class="card card-flush" th:unless="${posts == null or posts.isEmpty()}">
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>제목</th>
              <th>카테고리</th>
              <th>작성자</th>
              <th>조회</th>
              <th>좋아요</th>
              <th>작성일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="post : ${posts}">
              <td style="color:var(--t5);font-size:.8rem;" th:text="${post.id}"></td>
              <td>
                <a th:href="@{/posts/{id}(id=${post.id})}"
                   th:text="${#strings.abbreviate(post.title,30)}"
                   class="table-link"></a>
              </td>
              <td><span class="pill pill-gray" th:text="${post.category}"></span></td>
              <td th:text="${post.author.nickname}"></td>
              <td th:text="${post.viewCount}"></td>
              <td th:text="${post.likeCount}"></td>
              <td style="font-size:.78rem;color:var(--t5);"
                  th:text="${#temporals.format(post.createdAt,'yyyy.MM.dd')}"></td>
              <td>
                <form th:action="@{/admin/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('정말 삭제하시겠습니까?')">
                  <button type="submit" class="btn btn-danger btn-xs">삭제</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
