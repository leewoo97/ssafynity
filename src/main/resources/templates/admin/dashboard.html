<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('관리자 대시보드', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Admin</div>
        <h1>관리자 대시보드</h1>
      </div>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <!-- Nav pills -->
    <div class="tabs" style="margin-bottom:28px;">
      <a th:href="@{/admin}" class="tab active">대시보드</a>
      <a th:href="@{/admin/members}" class="tab">회원 관리</a>
      <a th:href="@{/admin/posts}" class="tab">게시글 관리</a>
    </div>

    <!-- Stat grid -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-card-label">전체 회원</div>
        <div class="stat-card-num" th:text="${memberCount ?: 0}">0</div>
        <div class="stat-card-sub">오늘 +<span th:text="${todayNewMembers ?: 0}">0</span>명</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">전체 게시글</div>
        <div class="stat-card-num" th:text="${postCount ?: 0}">0</div>
        <div class="stat-card-sub">오늘 +<span th:text="${todayNewPosts ?: 0}">0</span>건</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">전체 댓글</div>
        <div class="stat-card-num" th:text="${commentCount ?: 0}">0</div>
        <div class="stat-card-sub">오늘 +<span th:text="${todayNewComments ?: 0}">0</span>건</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">미처리 신고</div>
        <div class="stat-card-num" style="color:var(--red);" th:text="${pendingReports ?: 0}">0</div>
        <div class="stat-card-sub">처리 대기 중</div>
      </div>
    </div>

    <!-- Recent activity -->
    <div class="two-col" style="margin-top:28px;">
      <div class="sidebar-block">
        <div class="sidebar-block-head">최근 가입 회원</div>
        <div class="sidebar-block-body">
          <div th:if="${recentMembers == null or recentMembers.isEmpty()}"
               style="padding:16px 18px;color:var(--t4);font-size:.85rem;">없음</div>
          <div th:each="m : ${recentMembers}" class="sidebar-row">
            <div style="display:flex;align-items:center;gap:8px;flex:1;">
              <div class="av av-xs" th:text="${m.name != null ? #strings.substring(m.name,0,1) : 'U'}">U</div>
              <div>
                <div style="font-size:.85rem;font-weight:600;color:var(--t1);" th:text="${m.nickname}"></div>
                <div style="font-size:.75rem;color:var(--t5);" th:text="${m.loginId}"></div>
              </div>
            </div>
            <span class="sidebar-row-meta" th:text="${#temporals.format(m.createdAt,'MM.dd')}"></span>
          </div>
        </div>
      </div>

      <div class="sidebar-block">
        <div class="sidebar-block-head">최근 신고</div>
        <div class="sidebar-block-body">
          <div th:if="${recentReports == null or recentReports.isEmpty()}"
               style="padding:16px 18px;color:var(--t4);font-size:.85rem;">신고 없음</div>
          <div th:each="r : ${recentReports}" class="sidebar-row">
            <div style="flex:1;min-width:0;">
              <div style="font-size:.85rem;color:var(--t2);" th:text="${r.reason}"></div>
              <div style="font-size:.75rem;color:var(--t5);" th:text="${r.reporter.nickname} + ' → ' + ${r.targetTitle}"></div>
            </div>
            <span class="pill pill-red" style="flex-shrink:0;">처리대기</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
