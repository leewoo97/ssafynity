<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('관리자 대시보드', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Admin</div>
        <h1>관리자 대시보드</h1>
      </div>
      <div style="display:flex;gap:8px;">
        <a th:href="@{/admin/members}" class="btn btn-ghost btn-md">회원 관리</a>
        <a th:href="@{/admin/posts}" class="btn btn-ghost btn-md">게시글 관리</a>
      </div>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-card-icon">👥</div>
        <div class="stat-card-val" th:text="${memberCount}">0</div>
        <div class="stat-card-lbl">전체 회원</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">📝</div>
        <div class="stat-card-val" th:text="${postCount}">0</div>
        <div class="stat-card-lbl">전체 게시글</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">💬</div>
        <div class="stat-card-val" th:text="${commentCount}">0</div>
        <div class="stat-card-lbl">전체 댓글</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">📄</div>
        <div class="stat-card-val" th:text="${docCount}">0</div>
        <div class="stat-card-lbl">기술 문서</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">🎬</div>
        <div class="stat-card-val" th:text="${videoCount}">0</div>
        <div class="stat-card-lbl">영상 자료</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">📅</div>
        <div class="stat-card-val" th:text="${eventCount}">0</div>
        <div class="stat-card-lbl">이벤트</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">🚀</div>
        <div class="stat-card-val" th:text="${projectCount}">0</div>
        <div class="stat-card-lbl">프로젝트</div>
      </div>
      <div class="stat-card" th:if="${pendingReports != null}">
        <div class="stat-card-icon" style="color:var(--red);">🚨</div>
        <div class="stat-card-val" style="color:var(--red);" th:text="${pendingReports.size()}">0</div>
        <div class="stat-card-lbl">미처리 신고</div>
      </div>
    </div>

    <div class="two-col" style="margin-top:28px;">
      <div>
        <div class="label" style="margin-bottom:12px;">🚨 미처리 신고</div>
        <div th:if="${pendingReports == null or pendingReports.isEmpty()}" class="empty" style="padding:24px;">
          <div class="empty-icon">✅</div>
          <div class="empty-title" style="font-size:.9rem;">미처리 신고가 없습니다</div>
        </div>
        <div class="card card-flush" th:unless="${pendingReports == null or pendingReports.isEmpty()}">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr><th>신고자</th><th>대상</th><th>사유</th><th>날짜</th><th>처리</th></tr>
              </thead>
              <tbody>
                <tr th:each="report : ${pendingReports}">
                  <td th:text="${report.reporter.nickname}"></td>
                  <td>
                    <span class="pill pill-gray" th:text="${report.targetType}"></span>
                    <span style="font-size:.78rem;color:var(--t5);">#<span th:text="${report.targetId}"></span></span>
                  </td>
                  <td th:text="${report.reason}"></td>
                  <td style="font-size:.78rem;color:var(--t5);"
                      th:text="${#temporals.format(report.createdAt,'MM.dd')}"></td>
                  <td>
                    <form th:action="@{/admin/reports/{id}/resolve(id=${report.id})}" method="post" style="display:inline;">
                      <button type="submit" class="btn btn-ghost btn-xs">처리</button>
                    </form>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div>
        <div class="label" style="margin-bottom:12px;">🔥 인기 게시글</div>
        <div class="sidebar-block" th:if="${topLiked != null and !topLiked.isEmpty()}">
          <div class="sidebar-block-head">좋아요 TOP</div>
          <div class="sidebar-block-body">
            <div th:each="p : ${topLiked}" class="sidebar-row">
              <a th:href="@{/posts/{id}(id=${p.id})}" th:text="${p.title}" class="sidebar-row-title"></a>
              <span class="sidebar-row-meta" th:text="'❤ ' + ${p.likeCount}"></span>
            </div>
          </div>
        </div>
        <div class="sidebar-block" th:if="${topViewed != null and !topViewed.isEmpty()}" style="margin-top:12px;">
          <div class="sidebar-block-head">조회수 TOP</div>
          <div class="sidebar-block-body">
            <div th:each="p : ${topViewed}" class="sidebar-row">
              <a th:href="@{/posts/{id}(id=${p.id})}" th:text="${p.title}" class="sidebar-row-title"></a>
              <span class="sidebar-row-meta" th:text="'👁 ' + ${p.viewCount}"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
