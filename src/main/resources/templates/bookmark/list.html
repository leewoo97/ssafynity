<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('북마크', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <h1>북마크</h1>
  </div>
</div>

<div class="section-sm">
  <div class="container-sm">
    <div th:if="${bookmarks == null or bookmarks.isEmpty()}" class="empty">
      <div class="empty-icon">🔖</div>
      <div class="empty-title">북마크한 항목이 없습니다.</div>
      <div class="empty-sub">관심 있는 게시글에 🔖 를 눌러 저장하세요</div>
    </div>

    <div class="bm-list">
      <div th:each="bm : ${bookmarks}" class="bm-item">
        <div class="bm-icon">🔖</div>
        <div class="bm-body">
          <div class="bm-type">
            <span class="pill pill-gray" th:text="${bm.type}"></span>
          </div>
          <a th:href="${bm.targetUrl}" th:text="${bm.title}" class="bm-title"></a>
          <div class="bm-meta" th:text="${#temporals.format(bm.createdAt,'yyyy.MM.dd')}"></div>
        </div>
        <form th:action="@{'/bookmarks/' + ${bm.id} + '/delete'}" method="post" style="flex-shrink:0;">
          <button type="submit" class="btn btn-ghost btn-xs" style="color:var(--t5);">✕</button>
        </form>
      </div>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
