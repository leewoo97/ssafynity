<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('강의 영상')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container" style="padding-top:1.5rem;">

  <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1.2rem;">
    <div>
      <h2 style="font-size:1.5rem; font-weight:800;">🎬 강의 영상</h2>
      <p style="color:var(--muted); font-size:.88rem; margin-top:.2rem;">세미나, 튜토리얼, 코드리뷰 영상을 공유하세요.</p>
    </div>
    <a th:if="${session.loginMember != null and session.loginMember.role == 'ADMIN'}"
       th:href="@{/videos/new}" class="btn btn-primary">+ 영상 등록</a>
  </div>

  <!-- 검색 & 필터 -->
  <div class="card" style="margin-bottom:1.2rem; padding:1rem 1.25rem;">
    <form th:action="@{/videos}" method="get" style="display:flex; gap:.75rem; flex-wrap:wrap; align-items:center;">
      <input type="text" name="keyword" th:value="${keyword}" placeholder="영상 검색..."
             style="flex:1; min-width:180px; padding:.5rem .85rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--card-2); color:var(--text);">
      <select name="category" style="padding:.5rem .85rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--card-2); color:var(--text);">
        <option value="">전체 카테고리</option>
        <option th:each="cat : ${ {'SEMINAR','TUTORIAL','CODE_REVIEW','ALGORITHM','ETC'} }"
                th:value="${cat}" th:text="${cat}" th:selected="${cat == category}"></option>
      </select>
      <button type="submit" class="btn btn-primary">검색</button>
      <a th:href="@{/videos}" class="btn btn-ghost">초기화</a>
    </form>
  </div>

  <!-- 영상 그리드 -->
  <div th:if="${videos.isEmpty()}" class="card">
    <div class="empty-msg">
      <p style="font-size:2rem;">🎬</p>
      <p>등록된 영상이 없습니다.</p>
    </div>
  </div>

  <div th:if="${!videos.isEmpty()}" class="video-grid">
    <div th:each="video : ${videos}" class="video-card">
      <a th:href="@{/videos/{id}(id=${video.id})}" class="video-thumb">
        <img th:src="'https://img.youtube.com/vi/' + ${video.youtubeId} + '/mqdefault.jpg'"
             th:alt="${video.title}" loading="lazy">
        <div class="video-play-overlay">
          <div class="play-icon">▶</div>
        </div>
        <!-- 길이 배지 -->
        <span th:if="${video.duration != null}"
              style="position:absolute; bottom:.4rem; right:.5rem; background:rgba(0,0,0,.8); color:#fff; font-size:.72rem; padding:.1rem .4rem; border-radius:3px;"
              th:text="${video.duration}"></span>
      </a>
      <div class="video-body">
        <div style="display:flex; gap:.4rem; align-items:center; margin-bottom:.3rem;">
          <span class="cat-badge" th:text="${video.category}" style="font-size:.72rem;"></span>
          <span th:if="${video.pinned}" style="font-size:.75rem; color:#ef4444;">📌</span>
        </div>
        <h4><a th:href="@{/videos/{id}(id=${video.id})}" th:text="${video.title}"></a></h4>
        <div class="video-meta">
          <span th:text="${video.author.nickname}"></span>
          <span>👁 <span th:text="${video.viewCount}"></span></span>
          <span th:text="${#temporals.format(video.createdAt,'MM.dd')}"></span>
        </div>
        <div style="margin-top:.4rem;">
          <span th:each="tag,ti : ${video.tags?.split(',')}" th:if="${ti.index < 3}">
            <span class="tech-tag" th:text="${#strings.trim(tag)}"></span>
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- 페이지네이션 -->
  <div th:if="${totalPages > 1}" style="display:flex; justify-content:center; gap:.4rem; margin-top:2rem;">
    <a th:if="${currentPage > 0}"
       th:href="@{/videos(page=${currentPage-1}, keyword=${keyword}, category=${category})}"
       class="btn btn-ghost btn-sm">← 이전</a>
    <span th:each="i : ${#numbers.sequence(0, totalPages-1)}">
      <a th:href="@{/videos(page=${i}, keyword=${keyword}, category=${category})}"
         th:text="${i+1}"
         th:class="${i == currentPage} ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm'"></a>
    </span>
    <a th:if="${currentPage < totalPages-1}"
       th:href="@{/videos(page=${currentPage+1}, keyword=${keyword}, category=${category})}"
       class="btn btn-ghost btn-sm">다음 →</a>
  </div>

</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
