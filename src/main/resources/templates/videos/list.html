<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('영상 자료', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Learning</div>
        <h1>영상 자료</h1>
        <p>강의, 세미나, 프로젝트 영상을 공유하세요</p>
      </div>
      <a th:href="@{/videos/new}" class="btn btn-blue btn-md">🎬 영상 등록</a>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <div class="tabs">
      <a th:href="@{/videos(keyword=${keyword})}" class="tab"
         th:classappend="${category == null or category == ''} ? ' active' : ''">전체</a>
      <a th:each="cat : ${categories}"
         th:href="@{/videos(category=${cat},keyword=${keyword})}"
         th:text="${cat}" class="tab"
         th:classappend="${cat == category} ? ' active' : ''"></a>
    </div>
    <form th:action="@{/videos}" method="get" class="search-row" style="margin-bottom:24px;">
      <input type="hidden" name="category" th:value="${category}">
      <input type="text" name="keyword" th:value="${keyword}" placeholder="영상 검색..." class="search-input">
      <button type="submit" class="btn btn-blue btn-md">검색</button>
    </form>
    <div th:if="${videos == null or videos.isEmpty()}" class="empty">
      <div class="empty-icon">🎬</div>
      <div class="empty-title">등록된 영상이 없습니다.</div>
      <div class="empty-sub" style="margin-top:16px;">
        <a th:href="@{/videos/new}" class="btn btn-blue btn-md">첫 영상 등록하기</a>
      </div>
    </div>
    <div class="video-grid">
      <div th:each="video : ${videos}" class="video-card">
        <a th:href="@{/videos/{id}(id=${video.id})}">
          <div class="video-thumb">
            <img th:src="'https://img.youtube.com/vi/' + ${video.youtubeId} + '/mqdefault.jpg'"
                 alt="thumbnail">
            <div class="video-overlay">
              <div class="play-btn">▶</div>
            </div>
          </div>
        </a>
        <div class="video-body">
          <div style="display:flex;gap:6px;margin-bottom:4px;align-items:center;">
            <span class="pill pill-gray" th:text="${video.category}"></span>
            <span th:if="${video.duration != null}" style="font-size:.72rem;color:var(--t5);" th:text="${video.duration}"></span>
          </div>
          <div class="video-title">
            <a th:href="@{/videos/{id}(id=${video.id})}" th:text="${video.title}"></a>
          </div>
          <div class="video-meta">
            <span th:text="${video.author.nickname}"></span>
            <span>·</span>
            <span th:text="${#temporals.format(video.createdAt,'yyyy.MM.dd')}"></span>
            <span>·</span>
            <span>👁 <span th:text="${video.viewCount}"></span></span>
          </div>
        </div>
      </div>
    </div>
    <div class="pagination" th:if="${totalPages != null and totalPages > 1}">
      <a th:if="${currentPage > 0}"
         th:href="@{/videos(page=${currentPage-1},category=${category},keyword=${keyword})}">‹</a>
      <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <a th:href="@{/videos(page=${i},category=${category},keyword=${keyword})}"
           th:text="${i+1}" th:classappend="${i == currentPage} ? ' active' : ''"></a>
      </th:block>
      <a th:if="${currentPage < totalPages - 1}"
         th:href="@{/videos(page=${currentPage+1},category=${category},keyword=${keyword})}">›</a>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
