<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('영상 자료', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <div class="label" style="margin-bottom:6px;">Learning</div>
        <h1>영상 자료</h1>
        <p>강의, 세미나, 프로젝트 영상을 공유하세요</p>
      </div>
      <a th:href="@{/videos/new}" class="btn btn-blue btn-md">🎬 영상 등록</a>
    </div>
  </div>
</div>

<div class="section-sm">
  <div class="container">
    <!-- Tabs -->
    <div class="tabs">
      <a th:href="@{/videos(keyword=${keyword})}"
         class="tab" th:classappend="${category == null or category == ''} ? ' active' : ''">전체</a>
      <a th:each="cat : ${categories}"
         th:href="@{/videos(category=${cat},keyword=${keyword})}"
         th:text="${cat}" class="tab"
         th:classappend="${cat == category} ? ' active' : ''"></a>
    </div>

    <!-- Search -->
    <form th:action="@{/videos}" method="get" class="search-row" style="margin-bottom:24px;">
      <input type="hidden" name="category" th:value="${category}">
      <input type="text" name="keyword" th:value="${keyword}" placeholder="영상 검색..." class="search-input">
      <button type="submit" class="btn btn-blue btn-md">검색</button>
    </form>

    <div th:if="${videos == null or videos.content.isEmpty()}" class="empty">
      <div class="empty-icon">🎬</div>
      <div class="empty-title">등록된 영상이 없습니다.</div>
      <div class="empty-sub" style="margin-top:16px;">
        <a th:href="@{/videos/new}" class="btn btn-blue btn-md">첫 영상 등록하기</a>
      </div>
    </div>

    <div class="video-grid">
      <div th:each="video : ${videos.content}" class="video-card">
        <a th:href="@{/videos/{id}(id=${video.id})}">
          <div class="video-thumb">
            <img th:if="${video.thumbnailUrl != null}"
                 th:src="${video.thumbnailUrl}" alt="thumbnail">
            <div th:unless="${video.thumbnailUrl != null}"
                 style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:var(--surface-2);">🎬</div>
            <div class="video-play">▶</div>
          </div>
        </a>
        <div class="video-card-body">
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            <span class="pill pill-gray" th:text="${video.category}"></span>
          </div>
          <div class="video-card-title">
            <a th:href="@{/videos/{id}(id=${video.id})}" th:text="${video.title}"></a>
          </div>
          <div class="video-card-meta">
            <span th:text="${video.author.nickname}"></span>
            <span>·</span>
            <span th:text="${#temporals.format(video.createdAt,'yyyy.MM.dd')}"></span>
            <span>·</span>
            <span>👁 <span th:text="${video.viewCount}"></span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="pagination" th:if="${videos != null and videos.totalPages > 1}">
      <a th:if="${videos.hasPreviousPage}" th:href="@{/videos(page=${videos.number-1},category=${category},keyword=${keyword})}">‹</a>
      <th:block th:each="i : ${#numbers.sequence(0, videos.totalPages - 1)}">
        <a th:href="@{/videos(page=${i},category=${category},keyword=${keyword})}"
           th:text="${i+1}" th:classappend="${i == videos.number} ? ' active' : ''"></a>
      </th:block>
      <a th:if="${videos.hasNextPage}" th:href="@{/videos(page=${videos.number+1},category=${category},keyword=${keyword})}">›</a>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
