<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${doc.id == null ? '문서 작성' : '문서 수정'})}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container" style="padding-top:1.5rem; max-width:900px;">
  <div class="card">
    <h2 style="font-size:1.3rem; font-weight:800; margin-bottom:1.5rem;"
        th:text="${doc.id == null ? '📚 문서 작성' : '📚 문서 수정'}"></h2>

    <form th:action="${doc.id == null ? '/docs/new' : '/docs/' + doc.id + '/edit'}"
          th:object="${doc}" method="post">

      <!-- 제목 -->
      <div class="form-group">
        <label>제목 <span style="color:var(--danger);">*</span></label>
        <input type="text" th:field="*{title}" required placeholder="문서 제목을 입력하세요"
               style="width:100%; padding:.55rem .85rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--card-2); color:var(--text); font-size:.95rem;">
      </div>

      <!-- 카테고리 & 태그 -->
      <div class="form-row" style="margin-top:1rem;">
        <div class="form-group">
          <label>카테고리 <span style="color:var(--danger);">*</span></label>
          <select th:field="*{category}" required
                  style="width:100%; padding:.55rem .85rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--card-2); color:var(--text);">
            <option value="">카테고리 선택</option>
            <option th:each="cat : ${ {'JAVA','SPRING','REACT','DATABASE','ALGORITHM','DEVOPS','NETWORK','ETC'} }"
                    th:value="${cat}" th:text="${cat}"></option>
          </select>
        </div>
        <div class="form-group">
          <label>태그</label>
          <input type="text" th:field="*{tags}" placeholder="Java, Spring Boot, JPA (쉼표 구분)"
                 style="width:100%; padding:.55rem .85rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--card-2); color:var(--text);">
          <div class="tag-hint">쉼표(,)로 구분하여 최대 10개까지 입력하세요.</div>
        </div>
      </div>

      <!-- 본문 -->
      <div class="form-group" style="margin-top:1rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.4rem;">
          <label>본문 (Markdown 지원) <span style="color:var(--danger);">*</span></label>
          <button type="button" class="preview-toggle" id="previewBtn" onclick="togglePreview()">👁 미리보기</button>
        </div>
        <textarea th:field="*{content}" id="contentArea" required rows="20"
                  placeholder="Markdown 형식으로 작성하세요.&#10;&#10;## 제목&#10;&#10;내용을 작성하세요.&#10;&#10;```java&#10;// 코드 블록&#10;```"
                  style="width:100%; padding:.75rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--card-2); color:var(--text); font-family:'Consolas',monospace; font-size:.9rem; resize:vertical; line-height:1.6;"></textarea>
        <div id="mdPreview" class="md-preview markdown-body"></div>
      </div>

      <div style="display:flex; gap:.75rem; justify-content:flex-end; margin-top:1.5rem; border-top:1px solid var(--border); padding-top:1.2rem;">
        <a th:href="@{/docs}" class="btn btn-ghost">취소</a>
        <button type="submit" class="btn btn-primary"
                th:text="${doc.id == null ? '📤 문서 등록' : '✅ 수정 완료'}"></button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

<script>
function togglePreview() {
  const area = document.getElementById('contentArea');
  const preview = document.getElementById('mdPreview');
  const btn = document.getElementById('previewBtn');
  if (preview.style.display === 'block') {
    preview.style.display = 'none';
    area.style.display = 'block';
    btn.textContent = '👁 미리보기';
  } else {
    if (typeof marked !== 'undefined') {
      preview.innerHTML = marked.parse(area.value);
      if (typeof hljs !== 'undefined') {
        preview.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
      }
    }
    preview.style.display = 'block';
    area.style.display = 'none';
    btn.textContent = '✏ 편집';
  }
}
</script>
</body>
</html>
