<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${doc != null} ? '문서 수정' : '문서 작성', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="container">
    <h1 th:text="${doc != null} ? '문서 수정' : '새 문서 작성'"></h1>
  </div>
</div>

<div class="section-sm">
  <div class="container-sm">
    <div class="card">
      <form th:action="${doc != null} ? @{'/docs/' + ${doc.id} + '/edit'} : @{/docs}" method="post">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">카테고리</label>
            <select name="category" class="form-select">
              <option th:each="cat : ${categories}"
                      th:value="${cat}" th:text="${cat}"
                      th:selected="${doc != null and doc.category == cat}"></option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">태그 <span style="font-weight:400;color:var(--t5);">(쉼표 구분)</span></label>
            <input class="form-input" type="text" name="tags" th:value="${doc?.tags}" placeholder="Spring, JPA, React">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">제목</label>
          <input class="form-input" type="text" name="title"
                 th:value="${doc?.title}" required placeholder="문서 제목을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">내용 <span style="font-weight:400;color:var(--t5);">(Markdown 지원)</span></label>
          <textarea class="form-textarea" name="content" required
                    rows="20" placeholder="# 제목&#10;&#10;내용을 입력하세요..."
                    th:text="${doc?.content}" style="font-family:monospace;font-size:.9rem;"></textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <a th:href="${doc != null} ? @{'/docs/' + ${doc.id}} : @{/docs}" class="btn btn-ghost btn-md">취소</a>
          <button type="submit" class="btn btn-blue btn-md"
                  th:text="${doc != null} ? '수정하기' : '저장하기'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
