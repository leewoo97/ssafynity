<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${doc.title}, ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

<div class="section-sm">
  <div class="container">
    <div class="two-col">
      <div>
        <div class="card">
          <div class="post-header">
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
              <span class="pill pill-gray" th:text="${doc.category}"></span>
              <span th:if="${doc.pinned}" class="pill pill-orange">📌 추천</span>
              <span th:each="tag,ti : ${doc.tags?.split(',')}" th:if="${ti.index < 3}">
                <span class="tag" th:text="${#strings.trim(tag)}"></span>
              </span>
            </div>
            <h1 class="post-title" th:text="${doc.title}"></h1>
            <div class="post-attrs">
              <span class="post-attr">
                <a th:href="@{/profile/{id}(id=${doc.author.id})}"
                   style="font-weight:600;color:var(--blue);"
                   th:text="${doc.author.nickname}"></a>
              </span>
              <span class="post-attr">🕐 <span th:text="${#temporals.format(doc.createdAt,'yyyy.MM.dd HH:mm')}"></span></span>
              <span class="post-attr">👁 <span th:text="${doc.viewCount}"></span></span>
            </div>
          </div>

          <div class="post-body md-body" th:text="${doc.content}"></div>

          <div class="post-actions">
            <!-- Bookmark -->
            <form th:if="${session.loginMember != null}" th:action="@{/docs/{id}/bookmark(id=${doc.id})}" method="post" style="display:inline;">
              <button type="submit" class="btn btn-ghost btn-sm"
                      th:text="${isBookmarked} ? '🔖 북마크 해제' : '🔖 북마크'"></button>
            </form>
            <!-- Owner actions -->
            <th:block th:if="${session.loginMember != null and session.loginMember.id == doc.author.id}">
              <a th:href="@{/docs/{id}/edit(id=${doc.id})}" class="btn btn-ghost btn-sm">수정</a>
              <form th:action="@{/docs/{id}/delete(id=${doc.id})}" method="post" style="display:inline;"
                    onsubmit="return confirm('삭제하시겠습니까?')">
                <button type="submit" class="btn btn-danger btn-sm">삭제</button>
              </form>
            </th:block>
            <!-- Admin pin -->
            <th:block th:if="${session.loginMember != null and session.loginMember.role == 'ADMIN'}">
              <form th:action="@{/docs/{id}/pin(id=${doc.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn-pin" th:classappend="${doc.pinned} ? ' pinned' : ''">
                  📌 <span th:text="${doc.pinned} ? '추천 해제' : '추천'"></span>
                </button>
              </form>
            </th:block>
            <a th:href="@{/docs}" class="btn btn-ghost btn-sm" style="margin-left:auto;">목록</a>
          </div>
        </div>
      </div>

      <aside>
        <div class="sidebar-block">
          <div class="sidebar-block-head">📄 작성자</div>
          <div class="sidebar-block-body">
            <div style="padding:16px 18px;display:flex;align-items:center;gap:12px;">
              <div class="av av-md" th:text="${#strings.substring(doc.author.nickname,0,1)}">U</div>
              <div>
                <div style="font-size:.9rem;font-weight:600;color:var(--t1);" th:text="${doc.author.nickname}"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="sidebar-block" th:if="${relatedDocs != null and !relatedDocs.isEmpty()}">
          <div class="sidebar-block-head">관련 문서</div>
          <div class="sidebar-block-body">
            <div th:each="d : ${relatedDocs}" class="sidebar-row">
              <a th:href="@{/docs/{id}(id=${d.id})}" th:text="${d.title}" class="sidebar-row-title"></a>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
