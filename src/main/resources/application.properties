spring.application.name=demo
spring.profiles.include=local

# ── DataSource / JPA ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── JWT ──────────────────────────────────────────────────────────────────────
# 256-bit base64-encoded secret (실제 운영에서는 환경변수로 주입)
jwt.secret=c3NhZnluaXR5LXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1hdXRoZW50aWNhdGlvbg==
jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ── Mail (Gmail SMTP) ────────────────────────────────────────────────────────
# 실제 발송을 원하면 아래 값을 설정하세요.
# Gmail 앱 비밀번호: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8
# 미설정(default) 시 이메일 발송을 건너뜁니다 (로그만 출력)
app.base-url=http://localhost:5173
app.site-name=SSAFYnity

# ── Chat ─────────────────────────────────────────────────────────────────────
chat.history.max-size=100
